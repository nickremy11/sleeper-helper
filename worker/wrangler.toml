# Sleeper Helper — Worker config
# Docs: https://developers.cloudflare.com/workers/wrangler/configuration/

name               = "sleeper-helper-worker"
main               = "src/index.js"
compatibility_date = "2024-09-23"
workers_dev        = false

# Only /api/* on the subdomain hits this Worker.
# Everything else (static HTML) is served by Pages.
routes = [
  { pattern = "helper.ffhistorian.com/api/*", zone_name = "ffhistorian.com" }
]

# ── KV Namespace ──────────────────────────────────────────────────────────────
# 1. Run: wrangler kv namespace create SLEEPER_KV
#    Paste the returned id below.
# 2. Run: wrangler kv namespace create SLEEPER_KV --preview
#    Paste the returned id into preview_id.
[[kv_namespaces]]
binding    = "SLEEPER_KV"
id         = "4644440791c644cb9a6af30fa00fbd25"
preview_id = "182d9454412f4bfc9c9e396dbe53c468"

[observability]
enabled = true
