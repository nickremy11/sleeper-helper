<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>League Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rye&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared-styles.css">
  <style>
    .az-wrap { max-width: 1060px; margin: 0 auto; padding: 24px 16px 60px; }

    /* ── Banner league name ── */
    .az-league-title {
      font-family: 'Playfair Display', serif; font-weight: 700;
      font-size: clamp(1rem, 2.5vw, 1.4rem); color: var(--cream);
      margin-top: 6px; line-height: 1.2;
    }

    /* ── Format flags strip ── */
    .az-flags { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }
    .az-flag {
      font-family: 'Rye', serif; font-size: 0.57rem; letter-spacing: 0.12em;
      text-transform: uppercase; padding: 6px 14px; border: 1.5px solid var(--brown-mid);
      border-radius: 2px; color: var(--brown-light); background: rgba(0,0,0,0.22);
    }
    .az-flag-hi { border-color: var(--gold); color: var(--gold); background: rgba(201,150,42,0.08); }

    /* ── Controls row (format flags + contender mode toggle) ── */
    .az-controls-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    .az-mode-bar { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .az-mode-label { font-family: 'Rye', serif; font-size: 0.46rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold); margin-right: 2px; }
    .az-mode-pill {
      background: transparent; border: 1px solid var(--brown-mid); color: var(--brown-light);
      padding: 4px 13px; border-radius: 13px; font-size: 0.82rem; cursor: pointer; transition: all 0.15s;
    }
    .az-mode-pill:hover { color: var(--gold); border-color: var(--gold); }
    .az-mode-pill.active { border-color: var(--gold); color: var(--gold); background: rgba(201,150,42,0.10); }
    .az-th-sub { font-family: 'Crimson Text', serif; font-size: 0.62rem; font-weight: 400; letter-spacing: 0; text-transform: none; opacity: 0.7; }

    /* ── Scrollable table wrapper ── */
    .az-table-wrap { overflow-x: auto; }

    /* ── Table header row ── */
    .az-table-header {
      display: grid; align-items: center;
      background: #1e0e05; border: 1px solid var(--brown-mid); border-radius: 3px 3px 0 0;
      padding: 8px 14px; min-width: 680px;
    }
    .az-th-team {
      font-family: 'Rye', serif; font-size: 0.46rem; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--gold);
    }
    .az-th {
      font-family: 'Rye', serif; font-size: 0.46rem; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--gold); text-align: center;
    }
    .az-th-sortable { cursor: pointer; user-select: none; transition: color 0.15s; }
    .az-th-sortable:hover { color: var(--gold-light); }
    .az-th-active { color: var(--gold-light) !important; }

    /* ── Cards ── */
    .az-cards { display: flex; flex-direction: column; min-width: 680px; }
    details.az-card {
      background: var(--brown-dark); border: 1px solid var(--brown-mid);
      border-top: none; overflow: hidden;
    }
    details.az-card:last-child { border-radius: 0 0 3px 3px; }
    details.az-card summary { list-style: none; cursor: pointer; }
    details.az-card summary::-webkit-details-marker { display: none; }

    .az-card-row {
      display: grid; align-items: center;
      padding: 10px 14px; border-bottom: 1px dashed rgba(255,255,255,0.05);
    }
    details.az-card[open] .az-card-row { border-bottom-color: rgba(255,255,255,0.1); }
    .az-card-row:hover { background: rgba(255,255,255,0.02); }

    .az-team-col { display: flex; align-items: center; gap: 10px; overflow: hidden; }
    .az-rank-num {
      font-family: 'Rye', serif; font-size: 0.46rem; letter-spacing: 0.08em;
      color: var(--brown-light); min-width: 24px; flex-shrink: 0;
    }
    .az-rank-1 { color: var(--gold-light); }
    .az-rank-2 { color: var(--parchment); }
    .az-rank-3 { color: var(--parchment); opacity: 0.85; }
    .az-team-info { min-width: 0; }
    .az-team-name {
      font-family: 'Playfair Display', serif; font-weight: 700; font-size: 0.9rem;
      color: var(--cream); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .az-owner-name { font-family: 'Crimson Text', serif; font-size: 0.78rem; color: var(--brown-light); }

    .az-rank-cell { text-align: center; }
    .az-rank-badge {
      display: inline-block; font-family: 'Crimson Text', serif; font-weight: 600;
      font-size: 0.82rem; padding: 2px 6px; border-radius: 2px; min-width: 28px;
      text-align: center; color: var(--cream);
    }
    .az-chances-badge {
      font-family: 'Crimson Text', serif; font-size: 0.8rem; font-style: italic;
      white-space: nowrap;
    }
    .az-chances-lock  { color: #5cb85c; font-weight: 700; font-style: normal; }
    .az-chances-good  { color: var(--gold-light); }
    .az-chances-nervy { color: var(--parchment); }
    .az-chances-long  { color: var(--brown-light); }

    /* ── Playoff progress bar ── */
    .az-playoff-cell { padding: 0 8px; display: flex; flex-direction: column; justify-content: center; gap: 3px; }
    .az-playoff-bar-wrap { width: 100%; height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
    .az-playoff-bar-fill { height: 100%; border-radius: 3px; opacity: 0.8; }

    .az-chevron {
      font-size: 1.1rem; color: var(--brown-light); justify-self: end;
      transition: transform 0.2s;
    }
    details.az-card[open] .az-chevron { transform: rotate(90deg); }

    /* ── Card body ── */
    .az-card-body {
      padding: 14px 16px 16px; border-top: 1px solid rgba(255,255,255,0.06);
      display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 0 16px;
    }
    .az-pos-section { margin-bottom: 14px; }
    .az-pos-header {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 0 5px; border-bottom: 1px dashed rgba(255,255,255,0.08); margin-bottom: 5px;
    }
    .az-pos-rank-badge {
      font-family: 'Crimson Text', serif; font-weight: 600; font-size: 0.76rem;
      padding: 1px 5px; border-radius: 2px; color: var(--cream);
    }

    /* ── Player rows ── */
    .rs-pos { display: inline-block; font-family: 'Crimson Text', serif; font-size: 0.82rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 7px; border-radius: 2px; min-width: 32px; text-align: center; }
    .rs-pos-QB   { background: rgba(224,82,82,0.18);   color: #e05252; }
    .rs-pos-RB   { background: rgba(92,184,92,0.18);   color: #5cb85c; }
    .rs-pos-WR   { background: rgba(91,192,222,0.18);  color: #5bc0de; }
    .rs-pos-TE   { background: rgba(232,115,75,0.18);  color: #e8734b; }
    .rs-pos-DL   { background: rgba(155,89,182,0.18);  color: #9b59b6; }
    .rs-pos-LB   { background: rgba(41,128,185,0.18);  color: #3498db; }
    .rs-pos-DB   { background: rgba(26,188,156,0.18);  color: #1abc9c; }
    .rs-pos-PICK { background: rgba(210,205,195,0.14); color: #d8d5ce; }

    .pf-player-row { display: flex; align-items: center; gap: 6px; padding: 3px 4px; border-radius: 2px; margin-bottom: 2px; font-family: 'Crimson Text', serif; font-size: 0.86rem; color: var(--parchment); border-left: 2px solid transparent; }
    .pf-player-row.starter { background: rgba(255,255,255,0.055); border-left-color: var(--gold); }
    .pf-player-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pf-player-val  { font-size: 0.8rem; color: var(--brown-light); flex-shrink: 0; }
    .pf-player-via  { font-size: 0.7rem; color: var(--brown-light); font-style: italic; }

    .az-badge { font-family: 'Rye', serif; font-size: 0.57rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 6px 14px; border: 1.5px solid; border-radius: 2px; display: inline-block; }
    .az-badge-dynasty  { color: var(--gold);        border-color: var(--gold);        }
    .az-badge-redraft  { color: var(--green-light);  border-color: var(--green-light); }
    .az-badge-bestball { color: var(--brown-light);  border-color: var(--brown-light); }

    /* ── League switcher ── */
    .az-switcher-bar { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 14px; align-items: center; }
    .az-trade-btn {
      font-family: 'Rye', serif; font-size: 0.44rem; letter-spacing: 0.14em;
      text-transform: uppercase; padding: 7px 13px; border: 1.5px solid var(--brown-mid);
      border-radius: 2px; background: transparent; color: var(--brown-mid);
      cursor: pointer; transition: all 0.15s; white-space: nowrap; display: none;
    }
    .az-trade-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,150,42,0.06); }
    /* Trade picker panel */
    .az-trade-wrap { position: relative; }
    .az-trade-panel {
      position: absolute; right: 0; top: calc(100% + 6px); width: 280px;
      background: var(--brown-dark); border: 1px solid var(--brown-mid);
      border-radius: 3px; box-shadow: 0 4px 24px rgba(0,0,0,0.5); z-index: 300;
    }
    .az-trade-panel-hdr {
      padding: 9px 13px; border-bottom: 1px solid var(--brown-mid);
      font-family: 'Rye', serif; font-size: 0.4rem; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--brown-light);
    }
    .az-trade-item {
      display: block; padding: 9px 13px; border-bottom: 1px dashed rgba(255,255,255,0.05);
      font-family: 'Crimson Text', serif; font-size: 0.9rem; color: var(--parchment);
      text-decoration: none; transition: background 0.1s;
    }
    .az-trade-item:last-child { border-bottom: none; }
    .az-trade-item:hover { background: rgba(255,255,255,0.06); color: var(--cream); }
    .az-trade-item-sub { font-size: 0.74rem; color: var(--brown-light); margin-top: 1px; }
    .az-switcher-wrap { position: relative; }
    .az-switcher-btn {
      font-family: 'Rye', serif; font-size: 0.44rem; letter-spacing: 0.14em;
      text-transform: uppercase; padding: 7px 13px; border: 1.5px solid var(--brown-mid);
      border-radius: 2px; background: transparent; color: var(--brown-mid);
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .az-switcher-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,150,42,0.06); }
    .az-switcher-panel {
      position: absolute; right: 0; top: calc(100% + 6px); width: 300px;
      background: var(--brown-dark); border: 1px solid var(--brown-mid);
      border-radius: 3px; box-shadow: 0 4px 24px rgba(0,0,0,0.5); z-index: 300;
    }
    .az-switcher-search {
      width: 100%; padding: 9px 12px; background: rgba(0,0,0,0.25);
      border: none; border-bottom: 1px solid var(--brown-mid);
      color: var(--cream); font-family: 'Crimson Text', serif; font-size: 0.95rem;
      outline: none; border-radius: 3px 3px 0 0;
    }
    .az-switcher-search::placeholder { color: var(--brown-light); }
    .az-switcher-list { max-height: 300px; overflow-y: auto; }
    .az-switcher-item {
      display: block; padding: 9px 14px; font-family: 'Crimson Text', serif;
      font-size: 0.9rem; color: var(--parchment); text-decoration: none;
      border-bottom: 1px dashed rgba(255,255,255,0.05); transition: background 0.1s;
    }
    .az-switcher-item:last-child { border-bottom: none; }
    .az-switcher-item:hover { background: rgba(255,255,255,0.06); color: var(--cream); }
    .az-switcher-item.current { color: var(--gold-light); font-weight: 600; background: rgba(201,150,42,0.07); pointer-events: none; }
    .az-switcher-empty { padding: 12px 14px; font-family: 'Crimson Text', serif; font-size: 0.86rem; color: var(--brown-light); font-style: italic; }

    /* ── Trade Targets button + panel ── */
    .az-targets-wrap { position: relative; }
    .az-targets-btn {
      font-family: 'Rye', serif; font-size: 0.44rem; letter-spacing: 0.14em;
      text-transform: uppercase; padding: 7px 13px; border: 1.5px solid var(--brown-mid);
      border-radius: 2px; background: transparent; color: var(--brown-mid);
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .az-targets-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,150,42,0.06); }
    .az-targets-panel {
      position: absolute; right: 0; top: calc(100% + 6px); width: 340px;
      background: var(--brown-dark); border: 1px solid var(--brown-mid);
      border-radius: 3px; box-shadow: 0 4px 24px rgba(0,0,0,0.5); z-index: 300;
      max-height: 480px; overflow-y: auto;
    }
    .az-tgt-hdr {
      padding: 9px 13px; border-bottom: 1px solid var(--brown-mid);
      font-family: 'Rye', serif; font-size: 0.4rem; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--brown-light); display: flex; justify-content: space-between; align-items: center;
    }
    .az-tgt-myrow {
      padding: 8px 13px; border-bottom: 1px solid var(--brown-mid);
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .az-tgt-myname {
      font-family: 'Playfair Display', serif; font-size: 0.9rem; font-weight: 700; color: var(--cream);
    }
    .az-tgt-arch {
      font-family: 'Crimson Text', serif; font-size: 0.75rem; font-weight: 700; padding: 2px 8px;
      border-radius: 2px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .az-tgt-arch-c { background: rgba(92,184,92,0.18); color: #5cb85c; }
    .az-tgt-arch-r { background: rgba(91,192,222,0.18); color: #5bc0de; }
    .az-tgt-arch-u { background: rgba(210,205,195,0.14); color: #d8d5ce; }
    .az-tgt-needs {
      padding: 6px 13px 8px; border-bottom: 1px solid var(--brown-mid);
      display: flex; gap: 5px; flex-wrap: wrap; align-items: center;
    }
    .az-tgt-needs-lbl {
      font-family: 'Rye', serif; font-size: 0.38rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--brown-light); flex-shrink: 0; margin-right: 2px;
    }
    .az-tgt-need-chip {
      font-family: 'Crimson Text', serif; font-size: 0.76rem; font-weight: 700;
      padding: 2px 7px; border-radius: 2px;
    }
    .az-tgt-need-full  { background: rgba(224,82,82,0.22); color: #e05252; }
    .az-tgt-need-light { background: rgba(232,195,100,0.18); color: #e8c364; }
    .az-tgt-item {
      display: block; padding: 9px 13px; border-bottom: 1px dashed rgba(255,255,255,0.05);
      text-decoration: none; transition: background 0.1s; cursor: pointer;
    }
    .az-tgt-item:last-child { border-bottom: none; }
    .az-tgt-item:hover { background: rgba(255,255,255,0.05); }
    .az-tgt-item-top {
      display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 4px;
    }
    .az-tgt-tname {
      font-family: 'Playfair Display', serif; font-size: 0.88rem; font-weight: 700; color: var(--cream);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .az-tgt-analyze {
      font-family: 'Rye', serif; font-size: 0.38rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 3px 8px; border: 1px solid var(--brown-mid); border-radius: 2px;
      color: var(--brown-light); background: transparent; white-space: nowrap; flex-shrink: 0;
      text-decoration: none; transition: all 0.12s;
    }
    .az-tgt-analyze:hover { border-color: var(--gold); color: var(--gold); }
    .az-tgt-reasons { display: flex; flex-direction: column; gap: 3px; }
    .az-tgt-reason {
      font-family: 'Crimson Text', serif; font-size: 0.82rem; color: var(--parchment);
      display: flex; align-items: baseline; gap: 5px;
    }
    .az-tgt-reason-sub { font-size: 0.73rem; color: var(--brown-light); }
    .az-tgt-oddsline {
      font-family: 'Crimson Text', serif; font-size: 0.73rem; color: var(--brown-light); margin-top: 3px;
    }
    .az-tgt-empty {
      padding: 14px 13px; font-family: 'Crimson Text', serif; font-size: 0.88rem;
      color: var(--brown-light); font-style: italic;
    }
    .az-tgt-nopref {
      padding: 8px 13px; background: rgba(201,150,42,0.06); border-bottom: 1px solid var(--brown-mid);
      font-family: 'Crimson Text', serif; font-size: 0.8rem; color: var(--gold); font-style: italic;
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="banner">
      <div style="position:relative;z-index:1;padding:18px 20px;display:flex;justify-content:space-between;align-items:flex-start;">
        <div class="banner-text">
          <a href="/?tab=leagues" class="banner-back">← League Summaries</a>
          <h1>League <span>Analyzer</span></h1>
          <div class="az-league-title" id="league-title">Loading…</div>
          <div class="banner-divider"></div>
        </div>
        <div id="auth-chip"></div>
      </div>
    </div>

    <div class="az-wrap">
      <div class="az-switcher-bar">
        <div class="az-trade-wrap">
          <button id="az-trade-btn" class="az-trade-btn" onclick="toggleTradePicker(event)">⇄ Trade Analyzer</button>
          <div id="az-trade-panel" class="az-trade-panel" style="display:none;">
            <div class="az-trade-panel-hdr">Select Trade Partner</div>
            <div id="az-trade-list"></div>
          </div>
        </div>
        <div class="az-targets-wrap">
          <button id="az-targets-btn" class="az-targets-btn" onclick="toggleTradeTargets(event)" style="display:none;">◎ Trade Targets</button>
          <div id="az-targets-panel" class="az-targets-panel" style="display:none;">
            <div id="az-targets-content"></div>
          </div>
        </div>
        <div class="az-switcher-wrap">
          <button class="az-switcher-btn" onclick="toggleSwitcher(event)">⇅ Switch League</button>
          <div id="az-switcher-panel" class="az-switcher-panel" style="display:none;">
            <input id="az-switcher-search" class="az-switcher-search" type="text" placeholder="Search leagues…" oninput="filterSwitcher(this.value)" autocomplete="off">
            <div id="az-switcher-list" class="az-switcher-list"><div class="az-switcher-empty">Loading…</div></div>
          </div>
        </div>
      </div>
      <div id="content"></div>
    </div>
  </div>

  <script src="/shared-utils.js"></script>
  <script src="/shared-auth.js"></script>
  <script>
  'use strict';

  const API = window.location.hostname === 'ffhistorian.com'
    ? 'https://helper.ffhistorian.com/api'
    : '/api';

  const lgId      = new URLSearchParams(window.location.search).get('league') || '';
  const isEspn    = lgId.startsWith('espn_');
  const espnNumId = isEspn ? lgId.replace('espn_', '') : null;

  let sortKey = 'overall';
  let sortDir = 1; // -1 = desc (highest value first), 1 = asc
  let hasIDP  = false;

  // Contender rank: shares the formula + localStorage cache with League
  // Summaries (cr* helpers in shared-utils.js). Default mode 'adp'.
  let crMode = 'adp';
  const crData = { clayMap: {}, sleeperProjMap: {}, userProjMap: {}, loaded: false, loading: false };
  // Fallback starting lineup for ESPN leagues (no Sleeper roster_positions).
  const CR_ESPN_LINEUP = ['QB','RB','RB','WR','WR','WR','TE','FLEX','FLEX'];

  // Column layout — same grid template applied to header and every card row.
  // Rebuilt after hasIDP is known. Includes: team | overall | contender | QB | RB | WR | TE | [DL] | draft | playoff | chevron
  function gridTpl() {
    return `minmax(0,1fr) 68px 78px 58px 58px 58px 58px${hasIDP ? ' 74px' : ''} 64px 140px 22px`;
  }

  // ── Helpers ───────────────────────────────────────────────────────────────────

  function normPos(raw) {
    if (!raw) return null;
    const p = raw.toUpperCase();
    if (['QB','RB','WR','TE'].includes(p))           return p;
    if (['DE','DT','NT','IDL','DL'].includes(p))     return 'DL';
    if (['LB','ILB','OLB','MLB'].includes(p))        return 'LB';
    if (['CB','S','SS','FS','SAF','DB'].includes(p)) return 'DB';
    return null;
  }

  function ordinal(n) {
    if (!n) return '—';
    const s = ['th','st','nd','rd'], v = n % 100;
    return n + (s[(v - 20) % 10] || s[v] || s[0]);
  }

  function rankColor(rank, total) {
    const hue = Math.round(120 * (1 - (rank - 1) / Math.max(total - 1, 1)));
    return `hsl(${hue}, 62%, 38%)`;
  }

  function playoffLabel(standing, playoffTeams, numTeams) {
    if (standing <= Math.min(2, playoffTeams))       return { label: 'Lock',      cls: 'az-chances-lock'  };
    if (standing <= playoffTeams)                    return { label: 'In',         cls: 'az-chances-good'  };
    if (standing <= playoffTeams + Math.ceil((numTeams - playoffTeams) / 2))
                                                     return { label: 'Bubble',     cls: 'az-chances-nervy' };
    return                                                  { label: 'Long Shot',   cls: 'az-chances-long'  };
  }

  // ── League format flags ───────────────────────────────────────────────────────

  function buildFormatFlags(lg) {
    const sc = lg.scoring_settings || {}, st = lg.settings || {}, rp = lg.roster_positions || [];
    const flags = [];
    const starters = rp.filter(p => !['BN','IR','TAXI'].includes(p)).length;
    if (starters)                    flags.push({ label: starters + ' Starters', hi: false });
    flags.push(rp.includes('SUPER_FLEX')
      ? { label: 'SF',   hi: false }
      : { label: '1QB',  hi: false });
    const rec = sc.rec ?? 1;
    if (rec === 0)      flags.push({ label: 'Std',       hi: false });
    else if (rec < 1)   flags.push({ label: rec + 'PPR', hi: true  });
    else                flags.push({ label: 'PPR',        hi: true  });
    if ((sc.bonus_rec_te ?? 0) > 0) flags.push({ label: '+' + sc.bonus_rec_te + 'TEP',  hi: true  });
    if ((sc.bonus_rec_wr ?? 0) > 0) flags.push({ label: '+' + sc.bonus_rec_wr + 'WRP',  hi: true  });
    if (rp.filter(p => p === 'TE').length >= 2) flags.push({ label: '2xTE', hi: false });
    if ((sc.bonus_rec_fd  ?? 0) > 0) flags.push({ label: '+' + sc.bonus_rec_fd + 'FD',   hi: true  });
    if ((sc.bonus_rush_fd ?? sc.rush_fd ?? 0) > 0) flags.push({ label: '+' + (sc.bonus_rush_fd ?? sc.rush_fd) + 'RFD', hi: true  });
    if ((sc.rush_att ?? sc.rush_attempt ?? 0) > 0) flags.push({ label: 'PPC', hi: true  });
    if ((sc.pass_td ?? 4) !== 4) flags.push({ label: (sc.pass_td ?? 4) + 'ptTD', hi: true  });
    if ((sc.bonus_rush_yd_100 ?? sc.bonus_rec_yd_100 ?? 0) > 0) flags.push({ label: 'BigPlay', hi: true  });
    if ((sc.kr_yd ?? sc.pr_yd ?? sc.kr_td ?? sc.pr_td ?? 0) > 0) flags.push({ label: 'Ret', hi: true  });
    return flags;
  }

  function getSortKeys() {
    const keys = [
      { key: 'overall',   label: 'Overall'   },
      { key: 'contender', label: 'Contender' },
      { key: 'QB',        label: 'QB'        },
      { key: 'RB',        label: 'RB'        },
      { key: 'WR',        label: 'WR'        },
      { key: 'TE',        label: 'TE'        },
    ];
    if (hasIDP) keys.push({ key: 'DL', label: 'DL/LB/DB' });
    keys.push({ key: 'draft',   label: 'Draft'   });
    keys.push({ key: 'chances', label: 'Playoff' });
    return keys;
  }

  // ── Pick computation ──────────────────────────────────────────────────────────

  // Only generates picks for rounds the league actually uses.
  // numRounds: from draft settings, falling back to max traded pick round, then 4.
  function computePicksForRoster(myRosterId, allRosters, tradedPicks, nflSeason, numRounds) {
    const curYear = parseInt(nflSeason);
    const rounds  = Array.from({ length: numRounds }, (_, i) => i + 1);
    const seasons = new Set();
    for (let y = curYear; y <= curYear + 3; y++) seasons.add(String(y));
    for (const tp of (tradedPicks || [])) {
      if (parseInt(tp.season) >= curYear) seasons.add(String(tp.season));
    }
    const ownership = {};
    for (const r of allRosters) {
      for (const season of seasons) {
        for (const round of rounds) {
          ownership[`${season}_${round}_${r.roster_id}`] = r.roster_id;
        }
      }
    }
    for (const tp of (tradedPicks || [])) {
      if (tp.round > numRounds) continue;
      if (parseInt(tp.season) < curYear) continue;
      ownership[`${tp.season}_${tp.round}_${tp.roster_id}`] = tp.owner_id;
    }
    const picks = [];
    for (const [key, ownerId] of Object.entries(ownership)) {
      if (String(ownerId) !== String(myRosterId)) continue;
      const [season, round, origRid] = key.split('_');
      if (parseInt(season) === curYear) continue;
      picks.push({ season, round: parseInt(round), originalRosterId: parseInt(origRid) });
    }
    return picks;
  }

  // Build map of FC pick values: {year_round_qualifier: value, year_round: bestValue}
  function buildPickValueMap(fcRes) {
    const map = {};
    const arr = fcRes || [];

    // FC marks picks with position "PI"; fall back to no-sleeperId check for older formats
    const isPickItem = item => {
      const pos = (item.player?.position || '').toUpperCase();
      if (pos === 'PI' || pos === 'PICK') return true;
      const sid = item.player?.sleeperId || item.player?.maybeSleeperID;
      return !sid || String(sid) === '0';
    };

    const samplePick = arr.find(isPickItem);
    if (samplePick) console.log('[Analyzer] FC pick sample:', JSON.stringify(samplePick.player), 'value:', samplePick.value);
    else            console.warn('[Analyzer] No FC pick entries found — pick values will be empty');

    for (const item of arr) {
      if (!isPickItem(item)) continue;
      const name = (item.player?.name || '').toLowerCase();
      if (!name) continue;
      const yearM = name.match(/20(\d\d)/);
      if (!yearM) continue;
      const year = '20' + yearM[1];
      let round = 0;
      if      (/\b1(st)?\b/.test(name) || /first/.test(name))  round = 1;
      else if (/\b2(nd)?\b/.test(name) || /second/.test(name)) round = 2;
      else if (/\b3(rd)?\b/.test(name) || /third/.test(name))  round = 3;
      else if (/\b4(th)?\b/.test(name) || /fourth/.test(name)) round = 4;
      else if (/\b5(th)?\b/.test(name) || /fifth/.test(name))  round = 5;
      else if (/\b6(th)?\b/.test(name) || /sixth/.test(name))  round = 6;
      if (!round) continue;
      let q = 'mid';
      if (/early/.test(name)) q = 'early';
      else if (/late/.test(name)) q = 'late';
      map[`${year}_${round}_${q}`] = item.value;
      if (!map[`${year}_${round}`] || item.value > map[`${year}_${round}`]) {
        map[`${year}_${round}`] = item.value;
      }
    }
    console.log('[Analyzer] FC pick map built:', Object.keys(map).length, 'entries');
    return map;
  }

  function getPickValue(season, round, origRosterId, ridToSlot, numTeams, fcPickMap) {
    if (round > 4) return 0;
    const slot = ridToSlot?.[String(origRosterId)];
    let q = 'mid';
    if (slot && numTeams > 0) {
      const third = Math.ceil(numTeams / 3);
      if (slot <= third) q = 'early';
      else if (slot > numTeams - third) q = 'late';
    }
    // Try FC pick map first (real values), fall back to 0
    return fcPickMap[`${season}_${round}_${q}`]
        || fcPickMap[`${season}_${round}_mid`]
        || fcPickMap[`${season}_${round}_early`]
        || fcPickMap[`${season}_${round}`]
        || 0;
  }

  // ── Data builders ─────────────────────────────────────────────────────────────

  function buildFcMap(fcRes) {
    const map = {};
    for (const item of (fcRes || [])) {
      const sid = item.player?.sleeperId || item.player?.maybeSleeperID;
      if (sid) map[String(sid)] = item.value;
    }
    return map;
  }

  function buildPlayerMap(playersRes) {
    const KEEP = new Set(['QB','RB','WR','TE','DEF','DL','LB','DB','S','CB','DE','DT','FS','SS','IDL','OLB','ILB','MLB','SAF','NT']);
    const players = {}, byName = {};
    const rankOf = p => (p.search_rank != null && p.search_rank < 9999999) ? p.search_rank : Infinity;
    for (const [pid, p] of Object.entries(playersRes || {})) {
      if (!KEEP.has(p.position)) continue;
      players[pid] = p;
      if (!p.full_name) continue;
      // Normalize names + on collisions keep the more fantasy-relevant player.
      const key = normName(p.full_name);
      if (byName[key] == null || rankOf(p) < rankOf(players[byName[key]])) byName[key] = pid;
    }
    return { players, byName };
  }

  // ── Playoff simulation ───────────────────────────────────────────────────────

  const POS_CV = { QB: 0.43, RB: 0.50, WR: 0.52, TE: 0.58, DL: 0.55, LB: 0.55, DB: 0.55 };

  function computeProjPts(stats, scoringSettings) {
    let pts = 0;
    for (const [k, v] of Object.entries(stats || {})) {
      if (typeof v === 'number' && scoringSettings[k]) pts += v * scoringSettings[k];
    }
    return pts;
  }

  // Returns {mu, sigma} for a team's optimal projected lineup for one week.
  // sigma derived from player projections via position CV — no historical data needed.
  function optimalLineupAndSigma(playerIds, projMap, scoringSettings, rosterPositions, playersMap) {
    const starterSlots  = rosterPositions.filter(p => !['BN','IR','TAXI'].includes(p));
    const specificSlots = starterSlots.filter(s => !['FLEX','SUPER_FLEX','IDP_FLEX'].includes(s));
    const flexSlots     = starterSlots.filter(s =>  ['FLEX','SUPER_FLEX','IDP_FLEX'].includes(s));

    const pool = playerIds.map(pid => {
      const p = playersMap[pid];
      if (!p) return null;
      const pos = normPos(p.position);
      if (!pos) return null;
      return { pid, pos, pts: computeProjPts(projMap[pid], scoringSettings) };
    }).filter(Boolean);

    const used = new Set();
    let mu = 0, sigSq = 0;

    const slotCounts = {};
    for (const s of specificSlots) slotCounts[s] = (slotCounts[s] || 0) + 1;

    for (const [pos, count] of Object.entries(slotCounts)) {
      const eligible = pool.filter(p => p.pos === pos && !used.has(p.pid))
                          .sort((a, b) => b.pts - a.pts);
      for (let i = 0; i < Math.min(count, eligible.length); i++) {
        const pl = eligible[i];
        used.add(pl.pid);
        mu += pl.pts;
        const cv = POS_CV[pl.pos] ?? 0.50;
        sigSq += (cv * pl.pts) ** 2;
      }
    }

    for (const slot of flexSlots) {
      const eligPos =
        slot === 'FLEX'       ? ['RB','WR','TE'] :
        slot === 'SUPER_FLEX' ? ['QB','RB','WR','TE'] :
        slot === 'IDP_FLEX'   ? ['DL','LB','DB'] : [];
      const eligible = pool.filter(p => eligPos.includes(p.pos) && !used.has(p.pid))
                          .sort((a, b) => b.pts - a.pts);
      if (eligible.length) {
        const pl = eligible[0];
        used.add(pl.pid);
        mu += pl.pts;
        const cv = POS_CV[pl.pos] ?? 0.50;
        sigSq += (cv * pl.pts) ** 2;
      }
    }

    return { mu, sigma: Math.max(10, Math.sqrt(sigSq)) };
  }

  function gaussianRandom(mu, sigma) {
    let u, v;
    do { u = Math.random(); } while (!u);
    do { v = Math.random(); } while (!v);
    return Math.max(0, mu + sigma * Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v));
  }

  function runSimulation(teams, matchupsByWeek, muMap, sigmaMap, futureWeeks, playoffTeams, N = 5000) {
    const count = {};
    for (const t of teams) count[t.rosterId] = 0;

    for (let sim = 0; sim < N; sim++) {
      const wins = {}, pts = {};
      for (const t of teams) { wins[t.rosterId] = t.wins; pts[t.rosterId] = t.fpts; }

      for (const week of futureWeeks) {
        const groups = {};
        for (const m of (matchupsByWeek[week] || [])) {
          if (!m.matchup_id) continue;
          (groups[m.matchup_id] = groups[m.matchup_id] || []).push(m);
        }
        for (const pair of Object.values(groups)) {
          if (pair.length !== 2) continue;
          const [a, b] = pair;
          const sA = gaussianRandom(muMap[a.roster_id]?.[week] ?? 100, sigmaMap[a.roster_id]?.[week] ?? 20);
          const sB = gaussianRandom(muMap[b.roster_id]?.[week] ?? 100, sigmaMap[b.roster_id]?.[week] ?? 20);
          pts[a.roster_id] = (pts[a.roster_id] || 0) + sA;
          pts[b.roster_id] = (pts[b.roster_id] || 0) + sB;
          if      (sA > sB) wins[a.roster_id] = (wins[a.roster_id] || 0) + 1;
          else if (sB > sA) wins[b.roster_id] = (wins[b.roster_id] || 0) + 1;
        }
      }

      const ranked = teams.slice().sort((a, b) => {
        const wd = (wins[b.rosterId] || 0) - (wins[a.rosterId] || 0);
        return wd !== 0 ? wd : (pts[b.rosterId] || 0) - (pts[a.rosterId] || 0);
      });
      for (let i = 0; i < Math.min(playoffTeams, ranked.length); i++) count[ranked[i].rosterId]++;
    }

    const odds = {};
    for (const t of teams) odds[t.rosterId] = count[t.rosterId] / N;
    return odds;
  }

  // ── Sleeper load ──────────────────────────────────────────────────────────────

  async function loadSleeper() {
    const [leagueRes, rostersRes, usersRes, nflRes, playersRes, fcRes, draftsRaw, tradedRaw] = await Promise.all([
      fetch(`${API}/sleeper/league/${lgId}`).then(r => r.json()),
      fetch(`${API}/sleeper/league/${lgId}/rosters`).then(r => r.json()),
      fetch(`${API}/sleeper/league/${lgId}/users`).then(r => r.json()),
      fetch(`${API}/sleeper/state/nfl`).then(r => r.json()),
      fetch(`${API}/players`).then(r => r.json()),
      fetch(`${API}/fantasycalc`).then(r => r.json()),
      fetch(`${API}/sleeper/league/${lgId}/drafts`).then(r => r.ok ? r.json() : []).catch(() => []),
      fetch(`${API}/sleeper/league/${lgId}/traded_picks`).then(r => r.ok ? r.json() : []).catch(() => []),
    ]);

    const nflSeason  = nflRes?.season || String(new Date().getFullYear());
    const curYear    = parseInt(nflSeason);
    const fcMap      = buildFcMap(fcRes);
    const fcPickMap  = buildPickValueMap(fcRes);
    const { players, byName } = buildPlayerMap(playersRes);

    const userMap = {};
    for (const u of (usersRes || [])) {
      userMap[u.user_id] = { displayName: u.display_name || u.user_id, teamName: u.metadata?.team_name || null };
    }

    // ridToSlot from current-season draft
    const allDrafts   = Array.isArray(draftsRaw) ? draftsRaw : [];
    const tradedPicks = Array.isArray(tradedRaw) ? tradedRaw : [];
    const curDraft    = allDrafts.find(d => d.season === nflSeason);
    const rawSlots    = curDraft?.slot_to_roster_id;
    let ridToSlot = null;
    if (rawSlots && Object.keys(rawSlots).length) {
      ridToSlot = {};
      for (const [slot, rid] of Object.entries(rawSlots)) ridToSlot[String(rid)] = parseInt(slot);
    }
    // Actual rounds the league drafts — from draft settings, then highest traded pick round, then 4
    const maxTradedRound = tradedPicks.reduce((m, tp) => Math.max(m, tp.round || 0), 0);
    const numRounds = curDraft?.settings?.rounds || maxTradedRound || 4;

    const allRosters = rostersRes || [];
    const numTeams   = allRosters.length;

    // roster_id → display name (for "via" labels on traded picks)
    const rosterNames = {};
    for (const r of allRosters) {
      const info = userMap[r.owner_id];
      rosterNames[r.roster_id] = info?.teamName || info?.displayName || ('Team ' + r.roster_id);
    }

    // League meta
    const rp           = leagueRes?.roster_positions || [];
    const te2Mult      = rp.filter(p => p === 'TE').length >= 2 ? 1.4 : 1.0;
    const IDP_SLOTS    = new Set(['DL','LB','DB','DE','DT','IDP_FLEX','CB','S']);
    hasIDP             = rp.some(p => IDP_SLOTS.has(p));
    const lgType       = leagueRes?.settings?.type ?? 0;
    const isBB         = leagueRes?.settings?.best_ball === 1;
    const category     = isBB ? 'bestball' : lgType === 2 ? 'dynasty' : 'redraft';
    const lgName       = leagueRes?.name || lgId;
    const playoffTeams = leagueRes?.settings?.playoff_teams ?? Math.floor(numTeams / 2);
    const formatFlags  = buildFormatFlags(leagueRes || {});

    const DEF_P = new Set(['DL','LB','DB']);

    const teams = allRosters.map(roster => {
      const info    = userMap[roster.owner_id] || { displayName: 'Unknown', teamName: null };
      const wins    = roster.settings?.wins   ?? 0;
      const losses  = roster.settings?.losses ?? 0;
      const fpts    = (roster.settings?.fpts ?? 0) + (roster.settings?.fpts_decimal ?? 0) / 100;
      const starterSet = new Set(roster.starters || []);

      let overall = 0;
      const posValues = { QB: 0, RB: 0, WR: 0, TE: 0, DL: 0 };
      const playerList = [];

      for (const pid of (roster.players || [])) {
        const p = players[pid];
        if (!p) continue;
        const pos = normPos(p.position);
        if (!pos) continue;
        const val = (fcMap[pid] ?? 0) * (pos === 'TE' ? te2Mult : 1.0);
        overall += val;
        const bucket = DEF_P.has(pos) ? 'DL' : pos;
        if (bucket in posValues) posValues[bucket] += val;
        playerList.push({ pid, name: p.full_name || pid, pos, val, isStarter: starterSet.has(pid) });
      }
      playerList.sort((a, b) => {
        const ORDER = ['QB','RB','WR','TE','DL','LB','DB'];
        const ai = ORDER.indexOf(a.pos), bi = ORDER.indexOf(b.pos);
        return ai !== bi ? ai - bi : (b.val ?? -1) - (a.val ?? -1);
      });

      // Picks
      const rawPicks = computePicksForRoster(roster.roster_id, allRosters, tradedPicks, nflSeason, numRounds);
      let draftValue = 0;
      const pickList = rawPicks.map(pick => {
        const pv       = getPickValue(pick.season, pick.round, pick.originalRosterId, ridToSlot, numTeams, fcPickMap);
        draftValue    += pv;
        const roundStr = pick.round === 1 ? '1st' : pick.round === 2 ? '2nd' : pick.round === 3 ? '3rd' : pick.round + 'th';
        let label;
        if (ridToSlot) {
          const slot = ridToSlot[String(pick.originalRosterId)];
          label = slot ? `${pick.season} ${pick.round}.${String(slot).padStart(2,'0')}` : `${pick.season} ${roundStr}`;
        } else {
          label = `${pick.season} ${roundStr}`;
        }
        const isTraded = pick.originalRosterId !== roster.roster_id;
        return { label, val: pv, viaName: isTraded ? (rosterNames[pick.originalRosterId] || null) : null, season: pick.season, round: pick.round, originalRosterId: pick.originalRosterId };
      }).sort((a, b) => a.season !== b.season ? a.season.localeCompare(b.season) : a.round - b.round);

      return {
        rosterId: roster.roster_id, teamName: info.teamName, ownerName: info.displayName,
        wins, losses, fpts,
        overall: Math.round(overall),
        contender: 0, // computed by azApplyContender (shared cr* formula)
        posValues: { QB: Math.round(posValues.QB), RB: Math.round(posValues.RB), WR: Math.round(posValues.WR), TE: Math.round(posValues.TE), DL: Math.round(posValues.DL) },
        draft: Math.round(draftValue),
        playerList, pickList, standing: 0,
        playoffChances: { label: '—', cls: 'az-chances-nervy' },
      };
    });

    // Compute standings and playoff chances
    const byStand = [...teams].sort((a, b) => b.wins !== a.wins ? b.wins - a.wins : b.fpts - a.fpts);
    byStand.forEach((t, i) => { t.standing = i + 1; });
    for (const t of teams) t.playoffChances = playoffLabel(t.standing, playoffTeams, numTeams);

    // ── Playoff simulation ────────────────────────────────────────────────────
    const playoffWeekStart   = leagueRes?.settings?.playoff_week_start ?? 15;
    const regularSeasonWeeks = playoffWeekStart - 1;
    const scoringSettings    = leagueRes?.scoring_settings || {};

    // Fetch all regular-season matchup weeks in parallel
    const matchupWeeks = await Promise.all(
      Array.from({ length: regularSeasonWeeks }, (_, i) => i + 1).map(w =>
        fetch(`${API}/sleeper/league/${lgId}/matchups/${w}`)
          .then(r => r.ok ? r.json() : []).catch(() => [])
      )
    );

    const matchupsByWeek = {};
    const futureWeeks    = [];
    matchupWeeks.forEach((matchups, idx) => {
      const week = idx + 1;
      matchupsByWeek[week] = matchups || [];
      if (!(matchups || []).some(m => (m.points ?? 0) > 0)) futureWeeks.push(week);
    });

    // Check session cache — keyed by league + season + regular-season length
    const _simCacheKey = `az_odds_${lgId}_${nflSeason}_w${regularSeasonWeeks}`;
    let _cachedOdds = null;
    try {
      const _c = JSON.parse(sessionStorage.getItem(_simCacheKey) || 'null');
      if (_c && Date.now() - _c.ts < 2 * 3600 * 1000) _cachedOdds = _c.odds;
    } catch {}

    if (_cachedOdds) {
      for (const t of teams) { if (_cachedOdds[t.rosterId] !== undefined) t.playoffOdds = _cachedOdds[t.rosterId]; }
    } else if (futureWeeks.length === 0) {
      // Post-season: standings are final — assign hard 1.0 / 0.0
      byStand.forEach((t, i) => { t.playoffOdds = i < playoffTeams ? 1.0 : 0.0; });
    } else {
      // Fetch player projections for every remaining week in parallel.
      // Sleeper projection endpoint: /projections/nfl/{season_type}/{season}/{week}
      const projResults = await Promise.all(
        futureWeeks.map(w =>
          fetch(`${API}/sleeper/projections/nfl/regular/${nflSeason}/${w}`)
            .then(r => r.ok ? r.json() : {}).catch(() => ({}))
        )
      );
      const projectionsByWeek = {};
      futureWeeks.forEach((w, idx) => { projectionsByWeek[w] = projResults[idx] || {}; });

      // Build mu + sigma per roster per future week
      const muMap = {}, sigmaMap = {};
      for (const roster of allRosters) {
        const rid = roster.roster_id;
        muMap[rid] = {}; sigmaMap[rid] = {};
        for (const week of futureWeeks) {
          const { mu, sigma } = optimalLineupAndSigma(
            roster.players || [], projectionsByWeek[week], scoringSettings, rp, players
          );
          muMap[rid][week] = mu;
          sigmaMap[rid][week] = sigma;
        }
      }

      // Fallback: if projections returned empty (avg mu < 20 pts) use FC overall values
      // scaled to realistic weekly scoring range so results are still meaningful.
      const simTeams = teams.filter(t => t.overall > 0 || t.wins > 0 || t.losses > 0);
      const avgMu = simTeams.reduce((s, t) =>
        s + futureWeeks.reduce((ws, w) => ws + (muMap[t.rosterId]?.[w] ?? 0), 0), 0
      ) / Math.max(1, simTeams.length * futureWeeks.length);

      if (avgMu < 20) {
        const meanOverall = simTeams.reduce((s, t) => s + t.overall, 0) / Math.max(1, simTeams.length);
        for (const roster of allRosters) {
          const t = teams.find(tm => tm.rosterId === roster.roster_id);
          if (!t) continue;
          const mu = meanOverall > 0 ? 110 * (t.overall / meanOverall) : 110;
          const clampedMu = Math.max(60, Math.min(160, mu));
          const sigma = Math.max(12, clampedMu * 0.20);
          for (const week of futureWeeks) {
            muMap[roster.roster_id][week]    = clampedMu;
            sigmaMap[roster.roster_id][week] = sigma;
          }
        }
      }

      const odds = runSimulation(simTeams, matchupsByWeek, muMap, sigmaMap, futureWeeks, playoffTeams);
      for (const t of teams) {
        if (odds[t.rosterId] !== undefined) t.playoffOdds = odds[t.rosterId];
      }
      try { sessionStorage.setItem(_simCacheKey, JSON.stringify({ ts: Date.now(), odds })); } catch {}
    }

    // Re-value next-year picks based on original team's playoff odds
    // (bad team → likely early pick → more valuable)
    const _nextSeason = String(parseInt(nflSeason) + 1);
    const _oddsMap = {};
    for (const t of teams) _oddsMap[t.rosterId] = t.playoffOdds ?? null;
    for (const t of teams) {
      let _adj = 0;
      for (const pick of t.pickList) {
        if (pick.season === _nextSeason && pick.originalRosterId != null) {
          const origOdds = _oddsMap[pick.originalRosterId];
          if (origOdds != null) {
            const mult = origOdds >= 0.70 ? 1.0 : origOdds >= 0.30 ? 1.4 : 2.0;
            pick.val = Math.round(pick.val * mult);
          }
        }
        _adj += pick.val;
      }
      t.draft = Math.round(_adj);
    }

    const numStartersPerTeam = rp.filter(p => !['BN','IR','TAXI'].includes(p)).length;
    const is2TE = te2Mult > 1;
    const nextSeason = _nextSeason; // already computed above

    return {
      teams: teams.filter(t => t.overall > 0 || t.wins > 0 || t.losses > 0),
      allRosters,
      lgName, category, season: nflSeason, formatFlags, numTeams,
      numStartersPerTeam, is2TE, nextSeason,
      crCtx: { players, byName, rosterPositions: rp, scoring: scoringSettings, season: nflSeason },
    };
  }

  // ── ESPN load ─────────────────────────────────────────────────────────────────

  async function loadEspn() {
    const ESPN_POS_MAP = {1:'QB',2:'RB',3:'WR',4:'TE',6:'DL',7:'LB',8:'DB',9:'DL',10:'DL',12:'LB',13:'LB',14:'DB',15:'DB',16:'DB'};
    const [espnRes, nflRes, playersRes, fcRes] = await Promise.all([
      fetch(`${API}/espn/fantasy/${espnNumId}?view=mRoster&view=mTeam`, { credentials: 'include' }).then(r => {
        if (!r.ok) throw new Error('ESPN data unavailable — log in and save ESPN credentials in your profile');
        return r.json();
      }),
      fetch(`${API}/sleeper/state/nfl`).then(r => r.json()),
      fetch(`${API}/players`).then(r => r.json()),
      fetch(`${API}/fantasycalc`).then(r => r.json()),
    ]);

    const nflSeason = nflRes?.season || String(new Date().getFullYear());
    const fcMap     = buildFcMap(fcRes);
    const { players, byName } = buildPlayerMap(playersRes);
    const lgName    = espnRes?.settings?.name || `ESPN ${espnNumId}`;
    const numTeams  = (espnRes?.teams || []).length;
    const playoffTeams = Math.floor(numTeams / 2);

    const teams = (espnRes?.teams || []).map(team => {
      const wins   = team.record?.overall?.wins   ?? 0;
      const losses = team.record?.overall?.losses ?? 0;
      const fpts   = team.record?.overall?.pointsFor ?? 0;
      let overall = 0;
      const posValues = { QB: 0, RB: 0, WR: 0, TE: 0, DL: 0 };
      const playerList = [];

      for (const entry of (team.roster?.entries || [])) {
        const pl = entry.playerPoolEntry?.playerPoolEntry?.player || entry.playerPoolEntry?.player;
        if (!pl) continue;
        const pid       = byName[normName(pl.fullName)];
        const sleeperP  = pid ? players[pid] : null;
        const espnPos   = ESPN_POS_MAP[pl.defaultPositionId];
        const pos       = sleeperP ? normPos(sleeperP.position) : (espnPos ? normPos(espnPos) : null);
        if (!pos) continue;
        const val       = pid ? (fcMap[pid] ?? 0) : 0;
        overall += val;
        const bucket = ['DL','LB','DB'].includes(pos) ? 'DL' : pos;
        if (bucket in posValues) posValues[bucket] += val;
        const isStarter = entry.lineupSlotId !== 20 && entry.lineupSlotId !== 21;
        playerList.push({ pid: pid || pl.fullName, name: sleeperP?.full_name || pl.fullName || '', pos, val, isStarter });
      }
      playerList.sort((a, b) => {
        const ORDER = ['QB','RB','WR','TE','DL','LB','DB'];
        const ai = ORDER.indexOf(a.pos), bi = ORDER.indexOf(b.pos);
        return ai !== bi ? ai - bi : (b.val ?? -1) - (a.val ?? -1);
      });

      return {
        rosterId: team.id, teamName: team.name || null, ownerName: null,
        wins, losses, fpts,
        overall: Math.round(overall), contender: 0, // computed by azApplyContender
        posValues: { QB: Math.round(posValues.QB), RB: Math.round(posValues.RB), WR: Math.round(posValues.WR), TE: Math.round(posValues.TE), DL: Math.round(posValues.DL) },
        draft: 0, playerList, pickList: [], standing: 0,
        playoffChances: { label: '—', cls: 'az-chances-nervy' },
      };
    });

    const byStand = [...teams].sort((a, b) => b.wins !== a.wins ? b.wins - a.wins : b.fpts - a.fpts);
    byStand.forEach((t, i) => { t.standing = i + 1; });
    for (const t of teams) t.playoffChances = playoffLabel(t.standing, playoffTeams, numTeams);

    return {
      teams, lgName, category: 'redraft', season: nflSeason, formatFlags: [], numTeams,
      crCtx: { players, byName, rosterPositions: CR_ESPN_LINEUP, scoring: {}, season: nflSeason },
    };
  }

  // ── Ranking ───────────────────────────────────────────────────────────────────

  function computeRanks(teams) {
    const rankBy = getter => {
      const sorted = [...teams].sort((a, b) => getter(b) - getter(a));
      const map = {};
      sorted.forEach((t, i) => { map[t.rosterId] = i + 1; });
      return map;
    };
    return {
      overall:   rankBy(t => t.overall),
      contender: rankBy(t => t.contender),
      QB:        rankBy(t => t.posValues.QB),
      RB:        rankBy(t => t.posValues.RB),
      WR:        rankBy(t => t.posValues.WR),
      TE:        rankBy(t => t.posValues.TE),
      DL:        rankBy(t => t.posValues.DL),
      draft:     rankBy(t => t.draft),
    };
  }

  // ── Init ──────────────────────────────────────────────────────────────────────

  async function init() {
    SharedAuth.init({ onLogin: () => {}, onLogout: () => {} });
    if (!lgId) { document.getElementById('content').innerHTML = errHtml(new Error('No league ID in URL')); return; }
    document.getElementById('content').innerHTML = loading('Loading league data…');
    try { await loadAndRender(); } catch(e) { document.getElementById('content').innerHTML = errHtml(e); }
  }

  async function loadAndRender() {
    const result = isEspn ? await loadEspn() : await loadSleeper();
    const { teams, lgName, category, season, formatFlags, numTeams, crCtx,
            numStartersPerTeam, is2TE, nextSeason, allRosters } = result;

    document.getElementById('league-title').textContent = lgName + ' · ' + season;
    document.title = 'Analyzer — ' + lgName;
    const _tradeBtn = document.getElementById('az-trade-btn');
    if (_tradeBtn && !isEspn) {
      _tradeBtn.style.display = 'inline-block';
    }

    window._azTeams = teams;
    window._azCtx   = crCtx;
    window._azMeta  = {
      category, numTeams, formatFlags,
      numStartersPerTeam: numStartersPerTeam || 0,
      is2TE:              is2TE              || false,
      nextSeason:         nextSeason         || String(new Date().getFullYear() + 1),
    };
    window._azMyRosterId = window._azMyRosterId ?? null;
    window._azMyPref     = window._azMyPref     ?? null;

    // Fire identity + pref loading in parallel (non-blocking — button shows when done)
    if (!isEspn) {
      Promise.all([
        azLoadIdentity(allRosters || []),
        azLoadPref(),
      ]).then(() => renderTradeTargetsBtn());
    }

    await azApplyContender(); // sets team.contender + window._azRanks, then renders
  }

  async function azLoadIdentity(allRosters) {
    const user = SharedAuth.getUser?.();
    if (!user?.sleeper_username) return;
    try {
      const su = await fetch(`${API}/sleeper/user/${encodeURIComponent(user.sleeper_username)}`).then(r => r.json());
      const mine = allRosters.find(r => r.owner_id === su.user_id);
      window._azMyRosterId = mine?.roster_id ?? null;
    } catch {}
  }

  async function azLoadPref() {
    const user = SharedAuth.getUser?.();
    let p = null;
    if (user) {
      try {
        const r = await fetch(`${API}/rootforme/prefs`, { credentials: 'include' });
        if (r.ok) p = ((await r.json()).prefs || {})[lgId] ?? null;
      } catch {}
    } else {
      try { p = (JSON.parse(localStorage.getItem('rfm_prefs') || '{}'))[lgId] ?? null; } catch {}
    }
    window._azMyPref = p ? (p.contender ? 'contender' : 'rebuilder') : null;
  }

  // Populate each team's contender score for the active mode, preferring the
  // value League Summaries already cached. computes via the shared cr* formula
  // only on a cache miss (e.g. direct navigation to the analyzer).
  async function azApplyContender() {
    const teams = window._azTeams || [];
    const ctx   = window._azCtx   || {};

    let scores = crReadCachedScores(lgId, crMode);

    if (!scores) {
      // Projections mode needs the three source maps loaded once.
      if (crMode === 'projections' && !crData.loaded) {
        crData.loading = true;
        renderAll(); // reflect "…" in the toggle while fetching
        const d = await crLoadProjectionData({
          apiBase: API, season: ctx.season, authed: !!SharedAuth.getUser?.(), byName: ctx.byName || {},
        });
        crData.clayMap = d.clayMap; crData.sleeperProjMap = d.sleeperProjMap; crData.userProjMap = d.userProjMap;
        crData.loaded = true; crData.loading = false;
      }
      const scoreCtx = {
        mode: crMode, players: ctx.players || {},
        clayMap: crData.clayMap, sleeperProjMap: crData.sleeperProjMap, userProjMap: crData.userProjMap,
        scoring: ctx.scoring || {}, rosterPositions: ctx.rosterPositions || [],
      };
      scores = {};
      for (const t of teams) scores[t.rosterId] = crScoreRoster(t.playerList.map(p => p.pid), scoreCtx);
      if (!isEspn) crCacheScores(lgId, crMode, scores); // share back to Summaries
    }

    for (const t of teams) t.contender = Math.round(scores[t.rosterId] ?? 0);
    window._azRanks = computeRanks(teams);
    renderAll();
    // Refresh trade targets with finalized playoff odds (if identity resolved)
    if (window._azMyRosterId) renderTradeTargetsBtn();
  }

  function azSetContenderMode(mode) {
    if (crMode === mode) return;
    crMode = mode;
    azApplyContender();
  }

  // ── Render ────────────────────────────────────────────────────────────────────

  function renderAll() {
    const teams    = window._azTeams || [];
    const ranks    = window._azRanks || {};
    const { category, numTeams, formatFlags } = window._azMeta || {};

    if (!teams.length) {
      document.getElementById('content').innerHTML = '<div class="empty-state"><p>No roster data found for this league</p></div>';
      return;
    }

    const SORT_KEYS = getSortKeys();
    const sortableKeys = new Set(SORT_KEYS.map(s => s.key));
    const valOf = key => t =>
      key === 'overall'   ? t.overall              :
      key === 'contender' ? t.contender            :
      key === 'draft'     ? t.draft                :
      key === 'chances'   ? (t.playoffOdds ?? -1)  :
      (t.posValues[key] ?? 0);

    const sorted = [...teams].sort((a, b) => sortDir * (valOf(sortKey)(b) - valOf(sortKey)(a)));

    const tpl = gridTpl();

    // Format flags bar
    const badgeCls = category === 'dynasty' ? 'az-badge-dynasty' : category === 'bestball' ? 'az-badge-bestball' : 'az-badge-redraft';
    const badgeLbl = category === 'dynasty' ? 'Dynasty' : category === 'bestball' ? 'Best Ball' : 'Redraft';
    const flagsHtml = `<div class="az-flags">
      <span class="az-badge ${badgeCls}">${badgeLbl}</span>
      <span class="az-flag">${numTeams} Teams</span>
      ${(formatFlags || []).map(f => `<span class="az-flag${f.hi ? ' az-flag-hi' : ''}">${f.label}</span>`).join('')}
    </div>`;

    // Contender "Starter Value" mode toggle (ADP / Projections)
    const modeBar = `<div class="az-mode-bar">
      <span class="az-mode-label">Starter Value</span>
      <button class="az-mode-pill${crMode==='adp'?' active':''}" onclick="azSetContenderMode('adp')">ADP</button>
      <button class="az-mode-pill${crMode==='projections'?' active':''}" onclick="azSetContenderMode('projections')">Projections</button>
    </div>`;

    // Column definitions (header + rank cells must match exactly)
    const posCols = ['QB','RB','WR','TE'];
    if (hasIDP) posCols.push('DL');
    const crModeLbl = crMode === 'adp' ? 'ADP' : crData.loading ? '…' : 'Proj';
    const rankCols = [
      { key: 'overall',   label: 'Overall'   },
      { key: 'contender', label: 'Contender<br><span class="az-th-sub">' + crModeLbl + '</span>' },
      ...posCols.map(p => ({ key: p, label: p === 'DL' ? 'DL/LB/DB' : p })),
      { key: 'draft',     label: 'Draft'     },
      { key: 'chances',   label: 'Playoff'   },
    ];

    const headerHtml = `<div class="az-table-header" style="grid-template-columns:${tpl};">
      <div class="az-th-team">Team</div>
      ${rankCols.map(c => {
        if (!sortableKeys.has(c.key)) return `<div class="az-th">${c.label}</div>`;
        const isActive = c.key === sortKey;
        const arrow = isActive ? (sortDir === -1 ? ' ▾' : ' ▴') : '';
        return `<div class="az-th az-th-sortable${isActive ? ' az-th-active' : ''}" onclick="setSort('${c.key}')">${c.label}${arrow}</div>`;
      }).join('')}
      <div></div>
    </div>`;

    // Build cards
    const cards = sorted.map((team, i) => {
      const rank    = i + 1;
      const rankCls = rank <= 3 ? ` az-rank-${rank}` : '';
      const display = team.teamName || team.ownerName || ('Team ' + team.rosterId);
      const ownerLn = team.teamName && team.ownerName ? `<div class="az-owner-name">${esc(team.ownerName)}</div>` : '';

      const rankCellsHtml = rankCols.map(col => {
        if (col.key === 'chances') {
          if (team.playoffOdds != null) {
            const p = team.playoffOdds;
            let label, color, weight, barPct;
            if (p >= 0.995)      { label = 'Lock'; color = '#5cb85c'; weight = '700'; barPct = 100; }
            else if (p <= 0.005) { label = 'Out';  color = '#e05252'; weight = '700'; barPct = 0; }
            else {
              barPct = Math.round(p * 100);
              label  = barPct + '%';
              color  = p >= 0.70 ? '#5cb85c' : p >= 0.30 ? 'var(--gold-light)' : '#e05252';
              weight = p >= 0.70 || p < 0.30 ? '700' : '400';
            }
            return `<div class="az-rank-cell az-playoff-cell">
              <span class="az-chances-badge" style="color:${color};font-weight:${weight};">${label}</span>
              <div class="az-playoff-bar-wrap"><div class="az-playoff-bar-fill" style="width:${barPct}%;background:${color};"></div></div>
            </div>`;
          }
          const { label, cls } = team.playoffChances || { label: '—', cls: 'az-chances-nervy' };
          return `<div class="az-rank-cell"><span class="az-chances-badge ${cls}">${label}</span></div>`;
        }
        const r  = (ranks[col.key] || {})[team.rosterId];
        if (!r) return `<div class="az-rank-cell"><span class="az-rank-badge" style="background:rgba(0,0,0,0.2);">—</span></div>`;
        const bg = rankColor(r, teams.length);
        const outline = col.key === sortKey ? 'box-shadow:0 0 0 1px rgba(255,255,255,0.25);' : '';
        return `<div class="az-rank-cell"><span class="az-rank-badge" style="background:${bg};${outline}">${r}</span></div>`;
      }).join('');

      // Expanded card body — position groups
      const POS_GROUPS = [
        { pos: 'QB', cls: 'rs-pos-QB' },
        { pos: 'RB', cls: 'rs-pos-RB' },
        { pos: 'WR', cls: 'rs-pos-WR' },
        { pos: 'TE', cls: 'rs-pos-TE' },
        ...(hasIDP ? [
          { pos: 'DL', cls: 'rs-pos-DL' },
          { pos: 'LB', cls: 'rs-pos-LB' },
          { pos: 'DB', cls: 'rs-pos-DB' },
        ] : []),
      ];

      // Map pos → rank key (DL/LB/DB all use the 'DL' rank)
      const posRankKey = { QB:'QB', RB:'RB', WR:'WR', TE:'TE', DL:'DL', LB:'DL', DB:'DL' };

      const posGroupsHtml = POS_GROUPS.map(({ pos, cls }) => {
        const posPlayers = team.playerList.filter(p => p.pos === pos);
        if (!posPlayers.length) return '';
        const rk  = (ranks[posRankKey[pos]] || {})[team.rosterId];
        const rkBg = rk ? rankColor(rk, teams.length) : 'transparent';
        const rkBadge = rk ? `<span class="az-pos-rank-badge" style="background:${rkBg};">${rk}</span>` : '';
        const rows = posPlayers.map(p => {
          const valStr = p.val > 0 ? Number(p.val).toLocaleString() : '—';
          return `<div class="pf-player-row${p.isStarter ? ' starter' : ''}">
            ${p.isStarter ? `<span style="color:var(--gold);font-size:0.68rem;flex-shrink:0;">★</span>` : `<span style="min-width:12px;flex-shrink:0;"></span>`}
            <span class="pf-player-name">${esc(p.name)}</span>
            <span class="pf-player-val">${valStr}</span>
          </div>`;
        }).join('');
        return `<div class="az-pos-section">
          <div class="az-pos-header"><span class="rs-pos ${cls}">${pos}</span>${rkBadge}</div>
          ${rows}
        </div>`;
      }).join('');

      const picksHtml = team.pickList.length ? (() => {
        const pickRk   = (ranks.draft || {})[team.rosterId];
        const pickBg   = pickRk ? rankColor(pickRk, teams.length) : 'transparent';
        const pickBadge = pickRk ? `<span class="az-pos-rank-badge" style="background:${pickBg};">${pickRk}</span>` : '';
        const rows = team.pickList.map(pick => {
          const valStr = pick.val > 0 ? Number(pick.val).toLocaleString() : '—';
          const viaHtml = pick.viaName ? `<span class="pf-player-via"> · via ${esc(pick.viaName)}</span>` : '';
          return `<div class="pf-player-row">
            <span style="min-width:12px;flex-shrink:0;"></span>
            <span class="pf-player-name">${esc(pick.label)}${viaHtml}</span>
            <span class="pf-player-val">${valStr}</span>
          </div>`;
        }).join('');
        return `<div class="az-pos-section">
          <div class="az-pos-header"><span class="rs-pos rs-pos-PICK">PICK</span>${pickBadge}</div>
          ${rows}
        </div>`;
      })() : '';

      return `<details class="az-card">
        <summary class="az-card-row" style="grid-template-columns:${tpl};">
          <div class="az-team-col">
            <div class="az-rank-num${rankCls}">#${rank}</div>
            <div class="az-team-info">
              <div class="az-team-name">${esc(display)}</div>
              ${ownerLn}
            </div>
          </div>
          ${rankCellsHtml}
          <span class="az-chevron">›</span>
        </summary>
        <div class="az-card-body">${posGroupsHtml}${picksHtml}</div>
      </details>`;
    }).join('');

    document.getElementById('content').innerHTML = `
      <div class="az-controls-row">${flagsHtml}${modeBar}</div>
      <div class="az-table-wrap">
        ${headerHtml}
        <div class="az-cards">${cards}</div>
      </div>
    `;
  }

  function setSort(key) {
    if (key === sortKey) {
      sortDir = -sortDir;
    } else {
      sortKey = key;
      sortDir = 1;
    }
    renderAll();
  }

  // ── League switcher ──────────────────────────────────────────────────────────

  let _switcherLoaded = false;
  let _switcherLeagues = [];
