  // ── Trade Targets ────────────────────────────────────────────────────────────

  // Build per-position rank arrays sorted best-first (index 0 = best player).
  // Projections mode: average PPG across Clay, Sleeper, and user projections scored
  // with this league's settings — same formula crPlayerPpg uses.
  // ADP fallback: negate search_rank so descending sort = ascending rank.
  function buildGlobalPosRanks() {
    const players = (window._azCtx || {}).players || {};
    const scoring = (window._azCtx || {}).scoring || {};
    const useProj = crData.loaded;
    const posMap = { QB: [], RB: [], WR: [], TE: [] };

    for (const [pid, p] of Object.entries(players)) {
      const pos = normPos(p.position);
      if (!pos || !['QB','RB','WR','TE'].includes(pos)) continue;

      let score;
      if (useProj) {
        // Mirror crPlayerPpg logic from shared-utils.js
        const vals = [];
        const clay = crData.clayMap?.[pid];
        if (clay) { const v = crScoreClay(clay.stats, scoring); if (v != null && v > 0) vals.push(v); }
        const slp = crData.sleeperProjMap?.[pid];
        if (slp) { const v = crScoreSleeper(slp, scoring); if (v != null && v > 0) vals.push(v); }
        const usr = crData.userProjMap?.[pid];
        if (usr?.ppg != null && usr.ppg > 0) vals.push(usr.ppg);
        score = vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
        if (!score || score <= 0) continue;
      } else {
        const sr = p.search_rank;
        if (!sr || sr <= 0) continue;
        score = -sr; // negate so descending sort = ascending rank; score is always negative
      }

      posMap[pos].push({ pid, score, age: p.age ?? null, name: p.full_name || pid });
    }

    const result = { QB: [], RB: [], WR: [], TE: [] };
    for (const pos of ['QB','RB','WR','TE']) result[pos] = posMap[pos].sort((a, b) => b.score - a.score);
    return result;
  }

  // Classify another team as contender (>40% odds OR traded away own 1st next year)
  function isContenderTeam(team) {
    if ((team.playoffOdds ?? 0) > 0.40) return true;
    const nextSeason = (window._azMeta || {}).nextSeason;
    if (!nextSeason) return false;
    // If they no longer own their own 1st-round pick next year → win-now mode
    const hasOwnFirst = (team.pickList || []).some(
      p => p.season === nextSeason && p.round === 1 && p.originalRosterId === team.rosterId
    );
    return !hasOwnFirst;
  }

  // Returns { QB, RB, WR, TE, flex } each: 'need' | 'light' | null
  function computeMyNeeds(myTeam, posRanks) {
    const { numStartersPerTeam, numTeams, is2TE } = window._azMeta || {};
    const myPref = window._azMyPref;
    const needs = { QB: null, RB: null, WR: null, TE: null, flex: false };
    if (!posRanks || !myPref) return needs;

    const byPos = pos => (myTeam.playerList || []).filter(p => p.pos === pos).sort((a, b) => b.val - a.val);
    const inTopN = (pid, pos, n) => {
      const idx = (posRanks[pos] || []).findIndex(p => p.pid === pid);
      return idx !== -1 && idx < n;
    };

    if (myPref === 'contender') {
      // QB: 3rd QB not a starter on my team → light need
      const qbs = byPos('QB');
      if (qbs[2] && !qbs[2].isStarter) needs.QB = 'light';

      // RB: < 2 top-36 → need; ≤ 3 top-48 → light need
      const rbs = byPos('RB');
      const rb36 = rbs.filter(p => inTopN(p.pid, 'RB', 36)).length;
      const rb48 = rbs.filter(p => inTopN(p.pid, 'RB', 48)).length;
      if (rb36 < 2) needs.RB = 'need';
      else if (rb48 <= 3) needs.RB = 'light';

      // WR: < 3 top-48 → need; ≤ 4 top-60 → light need
      const wrs = byPos('WR');
      const wr48 = wrs.filter(p => inTopN(p.pid, 'WR', 48)).length;
      const wr60 = wrs.filter(p => inTopN(p.pid, 'WR', 60)).length;
      if (wr48 < 3) needs.WR = 'need';
      else if (wr60 <= 4) needs.WR = 'light';

      // TE (1TE: need if TE1 not top-12, light if TE2 not top-24)
      // (2TE: need if TE2 not top-24, or TE3 not top-30)
      const tes = byPos('TE');
      if (is2TE) {
        if (!tes[1] || !inTopN(tes[1].pid, 'TE', 24)) needs.TE = 'need';
        else if (!tes[2] || !inTopN(tes[2].pid, 'TE', 30)) needs.TE = 'need';
      } else {
        if (!tes[0] || !inTopN(tes[0].pid, 'TE', 12)) needs.TE = 'need';
        else if (!tes[1] || !inTopN(tes[1].pid, 'TE', 24)) needs.TE = 'light';
      }

      // Flex depth (only if no RB/WR need flagged)
      if (!needs.RB && !needs.WR && numStartersPerTeam && numTeams) {
        const X = Math.round(numTeams * numStartersPerTeam * 0.6);
        const flexRank = [...(posRanks.RB || []), ...(posRanks.WR || []), ...(posRanks.TE || [])]
          .sort((a, b) => b.score - a.score);
        const benchFlex = (myTeam.playerList || [])
          .filter(p => ['RB','WR','TE'].includes(p.pos) && !p.isStarter)
          .sort((a, b) => b.val - a.val).slice(0, 3);
        const flexIdxMap = {};
        flexRank.forEach((p, i) => { flexIdxMap[p.pid] = i; });
        if (benchFlex.some(p => (flexIdxMap[p.pid] ?? 9999) >= X)) needs.flex = true;
      }

    } else if (myPref === 'rebuilder') {
      // QB: < 2 QBs in global top-24
      const qb24 = byPos('QB').filter(p => inTopN(p.pid, 'QB', 24)).length;
      if (qb24 < 2) needs.QB = 'need';
      // RB: never a need for rebuilders
      // WR: not enough top-60 WRs to fill WR starting slots
      const wrSlots = ((window._azCtx || {}).rosterPositions || []).filter(p => p === 'WR').length;
      const wr60 = byPos('WR').filter(p => inTopN(p.pid, 'WR', 60)).length;
      if (wr60 < wrSlots) needs.WR = 'need';
      // TE: no top-30 TE
      const tes = byPos('TE');
      if (!tes[0] || !inTopN(tes[0].pid, 'TE', 30)) needs.TE = 'need';
    }

    return needs;
  }

  // Returns excess position objects for a given team.
  // players array is sorted by global rank ascending so slice(-2) gives the most marginal qualifiers.
  function computeExcess(team, posRanks) {
    if (!posRanks) return [];
    const excess = [];
    const byPos = pos => (team.playerList || []).filter(p => p.pos === pos);
    const rankOf = (pid, pos) => {
      const idx = (posRanks[pos] || []).findIndex(p => p.pid === pid);
      return idx === -1 ? null : idx + 1;
    };
    const topN = (pos, n) => byPos(pos)
      .map(p => ({ ...p, rank: rankOf(p.pid, pos) }))
      .filter(p => p.rank != null && p.rank <= n)
      .sort((a, b) => a.rank - b.rank); // rank ascending → last entries are most marginal

    const qbTop24 = topN('QB', 24);
    if (qbTop24.length >= 4) excess.push({ pos: 'QB', label: `${qbTop24.length} top-24 QBs`, players: qbTop24 });
    const rbTop36 = topN('RB', 36);
    if (rbTop36.length >= 5) excess.push({ pos: 'RB', label: `${rbTop36.length} top-36 RBs`, players: rbTop36 });
    const wrTop48 = topN('WR', 48);
    if (wrTop48.length >= 6) excess.push({ pos: 'WR', label: `${wrTop48.length} top-48 WRs`, players: wrTop48 });
    const teTop18 = topN('TE', 18);
    if (teTop18.length >= 2) excess.push({ pos: 'TE', label: `${teTop18.length} top-18 TEs`, players: teTop18 });
    return excess;
  }

  // Aging assets on a rebuilder that a contender would want
  function computeAgingAssets(team, posRanks) {
    if (!posRanks) return [];
    const assets = [];
    const byPos = pos => (team.playerList || []).filter(p => p.pos === pos).sort((a, b) => b.val - a.val);
    const posRankOf = (pid, pos) => {
      const idx = (posRanks[pos] || []).findIndex(p => p.pid === pid);
      return idx === -1 ? null : idx + 1;
    };
    const ageOf = pid => {
      for (const pos of ['QB','RB','WR','TE']) {
        const found = (posRanks[pos] || []).find(p => p.pid === pid);
        if (found) return found.age;
      }
      return null;
    };
    for (const qb of byPos('QB')) {
      const rk = posRankOf(qb.pid, 'QB'), age = ageOf(qb.pid);
      if (rk && rk <= 24 && age != null && age >= 30) assets.push({ pos: 'QB', player: qb, age, rank: rk });
    }
    for (const rb of byPos('RB')) {
      const rk = posRankOf(rb.pid, 'RB'), age = ageOf(rb.pid);
      if (rk && rk <= 36 && age != null && age >= 24) assets.push({ pos: 'RB', player: rb, age, rank: rk });
    }
    for (const wr of byPos('WR')) {
      const rk = posRankOf(wr.pid, 'WR'), age = ageOf(wr.pid);
      if (rk && rk <= 48 && age != null && age >= 27) assets.push({ pos: 'WR', player: wr, age, rank: rk });
    }
    for (const te of byPos('TE')) {
      const rk = posRankOf(te.pid, 'TE'), age = ageOf(te.pid);
      if (rk && rk <= 24 && age != null && age >= 28) assets.push({ pos: 'TE', player: te, age, rank: rk });
    }
    return assets;
  }

  function computeTradeTargets() {
    const myRid  = window._azMyRosterId;
    const myPref = window._azMyPref;
    const teams  = window._azTeams || [];
    if (!myRid) return null;
    const myTeam = teams.find(t => t.rosterId === myRid);
    if (!myTeam) return null;

    // Build ranking arrays once for this call (respects active ADP/Projections mode)
    const posRanks = buildGlobalPosRanks();

    const needs = computeMyNeeds(myTeam, posRanks);
    const activeNeeds = Object.entries(needs).filter(([k, v]) => v && k !== 'flex').map(([k]) => k);

    const targets = [];
    for (const t of teams) {
      if (t.rosterId === myRid) continue;
      const theirArch = isContenderTeam(t) ? 'contender' : 'rebuilder';
      const reasons = [];

      if (myPref === 'contender') {
        if (theirArch === 'rebuilder') {
          // Aging win-now assets from rebuilders — filter to my active needs (or all positions if no needs)
          const aging = computeAgingAssets(t, posRanks).filter(a => !activeNeeds.length || activeNeeds.includes(a.pos));
          for (const a of aging) reasons.push({ type: 'aging', ...a });
        }
        // Excess at positions I need (or any excess if no needs flagged)
        const exc = computeExcess(t, posRanks).filter(e => !activeNeeds.length || activeNeeds.includes(e.pos));
        for (const e of exc) reasons.push({ type: 'excess', ...e });
      } else if (myPref === 'rebuilder') {
        const exc = computeExcess(t, posRanks).filter(e => !activeNeeds.length || activeNeeds.includes(e.pos));
        for (const e of exc) reasons.push({ type: 'excess', ...e });
      }

      if (reasons.length) targets.push({ team: t, archetype: theirArch, reasons });
    }

    targets.sort((a, b) => b.reasons.length - a.reasons.length);
    return { myTeam, myPref, needs, targets };
  }

  function renderTradeTargetsBtn() {
    const btn = document.getElementById('az-targets-btn');
    if (!btn) return;
    const rid = window._azMyRosterId;
    if (!rid) { btn.style.display = 'none'; return; }
    btn.style.display = 'inline-block';
    // Pre-populate content so panel is ready when opened
    const contentEl = document.getElementById('az-targets-content');
    if (contentEl) contentEl.innerHTML = buildTradeTargetsHtml();
  }

  function buildTradeTargetsHtml() {
    const result = computeTradeTargets();
    if (!result) return `<div class="az-tgt-empty">Sign in and set your Sleeper username to see trade targets.</div>`;

    const { myTeam, myPref, needs, targets } = result;
    const myDisplay = myTeam.teamName || myTeam.ownerName || ('Team ' + myTeam.rosterId);

    // Pref chip
    const archHtml = myPref === 'contender'
      ? `<span class="az-tgt-arch az-tgt-arch-c">Contender</span>`
      : myPref === 'rebuilder'
      ? `<span class="az-tgt-arch az-tgt-arch-r">Rebuilder</span>`
      : `<span class="az-tgt-arch az-tgt-arch-u">No pref set</span>`;

    // Needs chips
    const POS_LABELS = { QB: 'QB', RB: 'RB', WR: 'WR', TE: 'TE' };
    const needChips = Object.entries(needs)
      .filter(([k, v]) => v && k !== 'flex')
      .map(([k, v]) => `<span class="az-tgt-need-chip ${v === 'need' ? 'az-tgt-need-full' : 'az-tgt-need-light'}">${POS_LABELS[k] || k}${v === 'light' ? '?' : ''}</span>`)
      .join('');
    const flexChip = needs.flex ? `<span class="az-tgt-need-chip az-tgt-need-light">Flex depth?</span>` : '';
    const noNeeds = !needChips && !flexChip;

    const POS_CLS = { QB: 'rs-pos-QB', RB: 'rs-pos-RB', WR: 'rs-pos-WR', TE: 'rs-pos-TE' };

    const noPrefNote = myPref ? '' : `<div class="az-tgt-nopref">Set your contender/rebuilder preference in <a href="/rootforme.html" style="color:var(--gold);">Root For Me</a> for tailored results.</div>`;

    const targetsHtml = targets.length === 0
      ? `<div class="az-tgt-empty">No clear trade targets found for this league.</div>`
      : targets.map(({ team, archetype, reasons }) => {
          const tDisplay = team.teamName || team.ownerName || ('Team ' + team.rosterId);
          const tArchHtml = archetype === 'contender'
            ? `<span class="az-tgt-arch az-tgt-arch-c" style="font-size:0.68rem;">Contender</span>`
            : `<span class="az-tgt-arch az-tgt-arch-r" style="font-size:0.68rem;">Rebuilder</span>`;
          const oddsLine = team.playoffOdds != null
            ? `<div class="az-tgt-oddsline">${Math.round(team.playoffOdds * 100)}% playoff odds</div>` : '';

          const reasonsHtml = reasons.map(r => {
            const posCls = POS_CLS[r.pos] || '';
            const posBadge = `<span class="rs-pos ${posCls}" style="font-size:0.7rem;padding:1px 5px;">${r.pos}</span>`;
            if (r.type === 'aging') {
              return `<div class="az-tgt-reason">${posBadge} <span>${esc(r.player.name)}</span> <span class="az-tgt-reason-sub">age ${r.age} · #${r.rank} ${r.pos}</span></div>`;
            } else {
              const last2 = (r.players || []).slice(-2);
              const inclHtml = last2.length
                ? `<span class="az-tgt-reason-sub">${last2.map(p => `#${p.rank} ${esc(p.name)}`).join(', ')}</span>`
                : '';
              return `<div class="az-tgt-reason">${posBadge} <span>${r.label}</span> ${inclHtml}</div>`;
            }
          }).join('');

          return `<div class="az-tgt-item">
            <div class="az-tgt-item-top">
              <span class="az-tgt-tname">${esc(tDisplay)}</span>
              <a class="az-tgt-analyze" href="/trade-analyzer?league=${encodeURIComponent(lgId)}&b=${team.rosterId}">Analyze ⇄</a>
            </div>
            <div class="az-tgt-reasons">${reasonsHtml}</div>
            <div class="az-tgt-oddsline" style="margin-top:4px;">${tArchHtml}${team.playoffOdds != null ? ` · ${Math.round(team.playoffOdds * 100)}% playoff odds` : ''}</div>
          </div>`;
        }).join('');

    return `
      <div class="az-tgt-hdr"><span>Trade Targets</span><span style="font-family:'Crimson Text',serif;font-size:0.72rem;font-weight:400;letter-spacing:0;text-transform:none;color:var(--brown-light);font-style:italic;">${crData.loaded ? 'Projections' : 'ADP'}</span></div>
      <div class="az-tgt-myrow">
        <span class="az-tgt-myname">${esc(myDisplay)}</span>
        ${archHtml}
      </div>
      ${myPref ? `<div class="az-tgt-needs">
        <span class="az-tgt-needs-lbl">Needs</span>
        ${needChips}${flexChip}
        ${noNeeds ? '<span style="font-family:\'Crimson Text\',serif;font-size:0.8rem;color:var(--brown-light);font-style:italic;">None detected</span>' : ''}
      </div>` : ''}
      ${noPrefNote}
      ${targetsHtml}
    `;
  }

  async function toggleTradeTargets(e) {
    e.stopPropagation();
    const panel = document.getElementById('az-targets-panel');
    if (!panel) return;
    const open = panel.style.display !== 'none';
    if (open) { panel.style.display = 'none'; return; }
    panel.style.display = 'block';
    const contentEl = document.getElementById('az-targets-content');
    // Load projections on first open — they're more accurate than generic ADP for trade targets
    if (!crData.loaded) {
      if (contentEl) contentEl.innerHTML = '<div class="az-tgt-empty">Loading projections…</div>';
      try {
        const ctx = window._azCtx || {};
        const d = await crLoadProjectionData({
          apiBase: API, season: ctx.season, authed: !!SharedAuth.getUser?.(), byName: ctx.byName || {},
        });
        crData.clayMap = d.clayMap; crData.sleeperProjMap = d.sleeperProjMap; crData.userProjMap = d.userProjMap;
        crData.loaded = true; crData.loading = false;
      } catch {}
    }
    if (contentEl) contentEl.innerHTML = buildTradeTargetsHtml();
  }

  // ── Trade picker ─────────────────────────────────────────────────────────────

  function toggleTradePicker(e) {
    e.stopPropagation();
    const panel = document.getElementById('az-trade-panel');
    if (!panel) return;
    const open = panel.style.display !== 'none';
    if (open) { panel.style.display = 'none'; return; }
    panel.style.display = 'block';
    const list = document.getElementById('az-trade-list');
    const teams = window._azTeams || [];
    const ranks = window._azRanks || {};
    if (!teams.length) {
      list.innerHTML = '<div class="az-switcher-empty">No teams found</div>';
      return;
    }
    list.innerHTML = teams
      .slice()
      .sort((a, b) => (ranks.overall?.[a.rosterId] || 99) - (ranks.overall?.[b.rosterId] || 99))
      .map(t => {
        const name = t.teamName || t.ownerName || ('Team ' + t.rosterId);
        const owner = t.teamName ? t.ownerName : null;
        const rank  = ranks.overall?.[t.rosterId];
        const rec   = `${t.wins}-${t.losses}`;
        return `<a class="az-trade-item" href="/trade-analyzer?league=${encodeURIComponent(lgId)}&b=${t.rosterId}">
          ${esc(name)}
          <div class="az-trade-item-sub">${owner ? esc(owner) + ' · ' : ''}${rec}${rank ? ' · #' + rank + ' overall' : ''}</div>
        </a>`;
      }).join('');
  }

  async function loadSwitcherLeagues() {
    const list = document.getElementById('az-switcher-list');
    const user = SharedAuth.getUser?.();
    const username = user?.sleeper_username;
    if (!username) {
      list.innerHTML = '<div class="az-switcher-empty">Sign in and set your Sleeper username in your profile to switch leagues.</div>';
      return;
    }
    list.innerHTML = '<div class="az-switcher-empty">Loading…</div>';
    try {
      const [nflRes, sleeperUser] = await Promise.all([
        fetch(`${API}/sleeper/state/nfl`).then(r => r.json()),
        fetch(`${API}/sleeper/user/${encodeURIComponent(username)}`).then(r => r.json()),
      ]);
      const season  = nflRes?.season || String(new Date().getFullYear());
      const leagues = await fetch(`${API}/sleeper/user/${sleeperUser.user_id}/leagues/nfl/${season}`).then(r => r.json());
      _switcherLeagues = (leagues || []).map(lg => ({ id: lg.league_id, name: lg.name || lg.league_id }));
      _switcherLoaded  = true;
      filterSwitcher(document.getElementById('az-switcher-search')?.value || '');
    } catch(e) {
      list.innerHTML = `<div class="az-switcher-empty">Error loading leagues: ${esc(String(e.message))}</div>`;
    }
  }

  function filterSwitcher(q) {
    const list     = document.getElementById('az-switcher-list');
    const term     = q.toLowerCase();
    const filtered = term ? _switcherLeagues.filter(l => l.name.toLowerCase().includes(term)) : _switcherLeagues;
    if (!filtered.length) { list.innerHTML = '<div class="az-switcher-empty">No matches</div>'; return; }
    list.innerHTML = filtered.map(lg => {
      const cur = lg.id === lgId;
      return `<a class="az-switcher-item${cur ? ' current' : ''}" href="/analyzer?league=${encodeURIComponent(lg.id)}">${esc(lg.name)}</a>`;
    }).join('');
  }

  init();
  </script>
