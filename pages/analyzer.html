<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>League Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rye&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared-styles.css">
  <style>
    .az-wrap { max-width: 860px; margin: 0 auto; padding: 24px 16px 48px; }

    .az-badge {
      font-family: 'Rye', serif; font-size: 0.42rem; letter-spacing: 0.15em;
      text-transform: uppercase; padding: 2px 8px; border: 1px solid; border-radius: 2px;
      display: inline-block;
    }
    .az-badge-dynasty  { color: var(--gold);         border-color: var(--gold);         }
    .az-badge-redraft  { color: var(--green-light);   border-color: var(--green-light);  }
    .az-badge-bestball { color: var(--brown-light);   border-color: var(--brown-light);  }

    .az-sort-bar {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; align-items: center;
    }
    .az-sort-label {
      font-family: 'Rye', serif; font-size: 0.42rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--brown-light); margin-right: 4px;
    }
    .az-pill {
      font-family: 'Rye', serif; font-size: 0.4rem; letter-spacing: 0.12em;
      text-transform: uppercase; padding: 4px 10px; border: 1px solid var(--brown-mid);
      border-radius: 2px; background: none; color: var(--brown-light); cursor: pointer;
      transition: all 0.15s;
    }
    .az-pill:hover         { border-color: var(--gold); color: var(--gold); }
    .az-pill.active        { border-color: var(--gold); color: var(--gold); background: rgba(201,150,42,0.08); }

    .az-cards { display: flex; flex-direction: column; gap: 10px; }

    details.az-card {
      background: var(--brown-dark); border: 1px solid var(--brown-mid); border-radius: 3px;
      overflow: hidden;
    }
    details.az-card summary { list-style: none; }
    details.az-card summary::-webkit-details-marker { display: none; }

    .az-card-header {
      padding: 12px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer;
    }
    .az-card-header:hover { background: rgba(255,255,255,0.02); }

    .az-rank {
      font-family: 'Rye', serif; font-size: 0.52rem; letter-spacing: 0.1em;
      color: var(--brown-light); min-width: 32px; flex-shrink: 0;
    }
    .az-rank-1 { color: var(--gold-light); }
    .az-rank-2 { color: var(--parchment); }
    .az-rank-3 { color: var(--parchment); opacity: 0.8; }

    .az-team-info { flex: 1; min-width: 0; }
    .az-team-name {
      font-family: 'Playfair Display', serif; font-weight: 700; font-size: 0.95rem;
      color: var(--cream); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .az-owner-name {
      font-family: 'Crimson Text', serif; font-size: 0.8rem; color: var(--brown-light); margin-top: 1px;
    }

    .az-stats { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
    .az-stat  { text-align: right; }
    .az-stat-label {
      font-family: 'Rye', serif; font-size: 0.34rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--brown-light);
    }
    .az-stat-val {
      font-family: 'Crimson Text', serif; font-size: 0.88rem; color: var(--parchment); font-weight: 600;
    }
    .az-stat-val.highlight { color: var(--gold-light); }

    .az-chevron {
      color: var(--brown-light); font-size: 1.1rem; flex-shrink: 0;
      transition: transform 0.2s;
    }
    details.az-card[open] .az-chevron { transform: rotate(90deg); }

    .az-card-body { border-top: 1px dashed rgba(255,255,255,0.08); padding: 14px; }

    .az-pos-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .az-pos-block {
      background: rgba(0,0,0,0.2); border: 1px solid var(--brown-mid); border-radius: 2px;
      padding: 6px 10px; min-width: 72px; text-align: center;
    }
    .az-pos-block-label {
      font-family: 'Rye', serif; font-size: 0.38rem; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--gold);
    }
    .az-pos-block-val {
      font-family: 'Crimson Text', serif; font-size: 0.9rem; color: var(--parchment); margin-top: 2px;
    }
    .az-pos-rank { font-size: 0.7rem; color: var(--brown-light); margin-left: 3px; }

    .az-players-label {
      font-family: 'Rye', serif; font-size: 0.38rem; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--brown-light); margin-bottom: 8px;
    }
    .az-player-rows { display: flex; flex-direction: column; gap: 2px; }
    .az-player-row {
      display: flex; align-items: center; gap: 8px; padding: 3px 0;
      border-bottom: 1px dashed rgba(255,255,255,0.04);
    }
    .az-player-row:last-child { border-bottom: none; }
    .az-player-pos {
      font-family: 'Rye', serif; font-size: 0.36rem; letter-spacing: 0.1em;
      color: var(--gold); min-width: 28px; flex-shrink: 0;
    }
    .az-player-name { font-family: 'Crimson Text', serif; font-size: 0.88rem; color: var(--parchment); flex: 1; }
    .az-player-val  { font-family: 'Crimson Text', serif; font-size: 0.82rem; color: var(--brown-light); }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="banner">
      <div style="position:relative;z-index:1;padding:18px 20px;display:flex;justify-content:space-between;align-items:flex-start;">
        <div class="banner-text">
          <a href="/" class="banner-back">← League Summaries</a>
          <h1>League <span>Analyzer</span></h1>
          <div class="banner-sub" id="banner-sub">Loading…</div>
          <div class="banner-divider"></div>
        </div>
        <div id="auth-chip"></div>
      </div>
    </div>

    <div class="az-wrap">
      <div id="content"></div>
    </div>
  </div>

  <script src="/shared-utils.js"></script>
  <script src="/shared-auth.js"></script>
  <script>
  'use strict';

  const API = window.location.hostname === 'ffhistorian.com'
    ? 'https://helper.ffhistorian.com/api'
    : '/api';

  // Read league ID from path: /analyzer/{lgId}
  const lgId      = new URLSearchParams(window.location.search).get('league') || '';
  const isEspn    = lgId.startsWith('espn_');
  const espnNumId = isEspn ? lgId.replace('espn_', '') : null;

  let sortKey = 'overall';

  const SORT_KEYS = [
    { key: 'overall',   label: 'Overall Value' },
    { key: 'contender', label: 'Contender'     },
    { key: 'QB',        label: 'QB'            },
    { key: 'RB',        label: 'RB'            },
    { key: 'WR',        label: 'WR'            },
    { key: 'TE',        label: 'TE'            },
    { key: 'DL',        label: 'DL/LB/DB'     },
  ];

  const SKILL_POS   = ['QB','RB','WR','TE'];
  const DEF_POS     = ['DL','LB','DB'];
  const KEEP_POS    = new Set(['QB','RB','WR','TE','DEF','DL','LB','DB','S','CB','DE','DT','FS','SS','IDL','OLB','ILB','MLB','SAF','SS','FS','CB','NT']);
  const ESPN_POS_MAP = {1:'QB',2:'RB',3:'WR',4:'TE',6:'DL',7:'LB',8:'DB',9:'DL',10:'DL',12:'LB',13:'LB',14:'DB',15:'DB',16:'DB'};

  function normPos(raw) {
    if (!raw) return null;
    const p = raw.toUpperCase();
    if (['QB','RB','WR','TE'].includes(p))           return p;
    if (['DE','DT','NT','IDL','DL'].includes(p))     return 'DL';
    if (['LB','ILB','OLB','MLB'].includes(p))        return 'LB';
    if (['CB','S','SS','FS','SAF','DB'].includes(p)) return 'DB';
    return null;
  }

  function fmtVal(v) {
    if (!v) return '—';
    return v >= 1000 ? (v / 1000).toFixed(1) + 'k' : Math.round(v).toString();
  }

  function ordinal(n) {
    if (!n) return '—';
    const s = ['th','st','nd','rd'], v = n % 100;
    return n + (s[(v - 20) % 10] || s[v] || s[0]);
  }

  async function init() {
    SharedAuth.init({ onLogin: () => {}, onLogout: () => {} });
    if (!lgId) {
      document.getElementById('content').innerHTML = errHtml(new Error('No league ID in URL'));
      return;
    }
    document.getElementById('content').innerHTML = loading('Loading league data…');
    try {
      await loadAndRender();
    } catch(e) {
      document.getElementById('content').innerHTML = errHtml(e);
    }
  }

  async function buildFcMap(fcRes) {
    const map = {};
    for (const item of (fcRes || [])) {
      const sid = item.player?.sleeperId || item.player?.maybeSleeperID;
      if (sid) map[String(sid)] = item.value;
    }
    return map;
  }

  function buildPlayerMap(playersRes) {
    const players = {};
    const byName  = {};
    for (const [pid, p] of Object.entries(playersRes || {})) {
      if (!KEEP_POS.has(p.position)) continue;
      players[pid] = p;
      if (p.full_name) byName[p.full_name.toLowerCase()] = pid;
    }
    return { players, byName };
  }

  function teamValue(pids, players, fcMap) {
    let overall = 0;
    const posValues = { QB: 0, RB: 0, WR: 0, TE: 0, DL: 0 };
    let contenderBase = 0;
    const playerList = [];

    for (const pid of pids) {
      const p = players[pid];
      if (!p) continue;
      const pos = normPos(p.position);
      if (!pos) continue;
      const val = fcMap[pid] ?? 0;
      overall += val;
      const bucket = DEF_POS.includes(pos) ? 'DL' : pos;
      if (bucket in posValues) posValues[bucket] += val;
      if (SKILL_POS.includes(pos) && (p.years_exp ?? 0) >= 3 && val > 0) contenderBase += val;
      if (val > 0) playerList.push({ pid, name: p.full_name || pid, pos, val });
    }

    playerList.sort((a, b) => b.val - a.val);
    return { overall, posValues, contenderBase, playerList };
  }

  // ── Sleeper league load ────────────────────────────────────────────────────

  async function loadSleeper() {
    const [leagueRes, rostersRes, usersRes, nflRes, playersRes, fcRes] = await Promise.all([
      fetch(`${API}/sleeper/league/${lgId}`).then(r => r.json()),
      fetch(`${API}/sleeper/league/${lgId}/rosters`).then(r => r.json()),
      fetch(`${API}/sleeper/league/${lgId}/users`).then(r => r.json()),
      fetch(`${API}/sleeper/state/nfl`).then(r => r.json()),
      fetch(`${API}/players`).then(r => r.json()),
      fetch(`${API}/fantasycalc`).then(r => r.json()),
    ]);

    const fcMap = await buildFcMap(fcRes);
    const { players } = buildPlayerMap(playersRes);

    const userMap = {};
    for (const u of (usersRes || [])) {
      userMap[u.user_id] = {
        displayName: u.display_name || u.user_id,
        teamName:    u.metadata?.team_name || null,
      };
    }

    const lgType    = leagueRes?.settings?.type ?? 0;
    const isBB      = leagueRes?.settings?.best_ball === 1;
    const category  = isBB ? 'bestball' : lgType === 2 ? 'dynasty' : 'redraft';
    const season    = leagueRes?.season || nflRes?.season || new Date().getFullYear().toString();
    const lgName    = leagueRes?.name || lgId;

    const teams = (rostersRes || []).map(roster => {
      const userInfo = userMap[roster.owner_id] || { displayName: 'Unknown', teamName: null };
      const wins   = roster.settings?.wins   ?? 0;
      const losses = roster.settings?.losses ?? 0;
      const { overall, posValues, contenderBase, playerList } = teamValue(roster.players || [], players, fcMap);
      return {
        rosterId:  roster.roster_id,
        teamName:  userInfo.teamName,
        ownerName: userInfo.displayName,
        wins, losses,
        overall:   Math.round(overall),
        contender: Math.round(contenderBase + wins * 50),
        posValues: {
          QB: Math.round(posValues.QB), RB: Math.round(posValues.RB),
          WR: Math.round(posValues.WR), TE: Math.round(posValues.TE),
          DL: Math.round(posValues.DL),
        },
        players: playerList,
      };
    });

    return { teams, lgName, category, season };
  }

  // ── ESPN league load ───────────────────────────────────────────────────────

  async function loadEspn() {
    const [espnRes, nflRes, playersRes, fcRes] = await Promise.all([
      fetch(`${API}/espn/fantasy/${espnNumId}?view=mRoster&view=mTeam`, { credentials: 'include' }).then(r => {
        if (!r.ok) throw new Error('ESPN data unavailable — make sure you are logged in and have ESPN credentials saved in your profile');
        return r.json();
      }),
      fetch(`${API}/sleeper/state/nfl`).then(r => r.json()),
      fetch(`${API}/players`).then(r => r.json()),
      fetch(`${API}/fantasycalc`).then(r => r.json()),
    ]);

    const fcMap = await buildFcMap(fcRes);
    const { players, byName } = buildPlayerMap(playersRes);

    const lgName  = espnRes?.settings?.name || `ESPN ${espnNumId}`;
    const season  = nflRes?.season || new Date().getFullYear().toString();

    const teams = (espnRes?.teams || []).map(team => {
      const pids   = [];
      const extras = []; // entries without a matching Sleeper ID

      for (const entry of (team.roster?.entries || [])) {
        const pl       = entry.playerPoolEntry?.playerPoolEntry?.player || entry.playerPoolEntry?.player;
        const fullName = pl?.fullName || '';
        const espnPosId = pl?.defaultPositionId;
        const pid = byName[fullName.toLowerCase()];
        if (pid) {
          pids.push(pid);
        } else if (fullName) {
          // Fallback: assign value 0 but still show the player
          const espnPos = ESPN_POS_MAP[espnPosId] || null;
          const pos     = espnPos ? normPos(espnPos) : null;
          if (pos) extras.push({ pid: fullName, name: fullName, pos, val: 0 });
        }
      }

      const { overall, posValues, contenderBase, playerList } = teamValue(pids, players, fcMap);

      const teamName  = team.name || (team.location ? team.location + ' ' + team.nickname : null);
      const wins   = team.record?.overall?.wins   ?? 0;
      const losses = team.record?.overall?.losses ?? 0;

      return {
        rosterId:  team.id,
        teamName,
        ownerName: null,
        wins, losses,
        overall:   Math.round(overall),
        contender: Math.round(contenderBase + wins * 50),
        posValues: {
          QB: Math.round(posValues.QB), RB: Math.round(posValues.RB),
          WR: Math.round(posValues.WR), TE: Math.round(posValues.TE),
          DL: Math.round(posValues.DL),
        },
        players: [...playerList, ...extras].sort((a, b) => b.val - a.val),
      };
    });

    return { teams, lgName, category: 'redraft', season };
  }

  // ── Ranking helpers ────────────────────────────────────────────────────────

  function computeRanks(teams) {
    const rankBy = getter => {
      const sorted = [...teams].sort((a, b) => getter(b) - getter(a));
      const map = {};
      sorted.forEach((t, i) => { map[t.rosterId] = i + 1; });
      return map;
    };
    return {
      overall:   rankBy(t => t.overall),
      contender: rankBy(t => t.contender),
      QB:        rankBy(t => t.posValues.QB),
      RB:        rankBy(t => t.posValues.RB),
      WR:        rankBy(t => t.posValues.WR),
      TE:        rankBy(t => t.posValues.TE),
      DL:        rankBy(t => t.posValues.DL),
    };
  }

  // ── Main load + render entry ───────────────────────────────────────────────

  async function loadAndRender() {
    const { teams, lgName, category, season } = isEspn ? await loadEspn() : await loadSleeper();

    document.getElementById('banner-sub').textContent = lgName + ' · ' + season;
    document.title = 'Analyzer — ' + lgName;

    window._azTeams    = teams.filter(t => t.overall > 0 || t.wins > 0 || t.losses > 0);
    window._azRanks    = computeRanks(window._azTeams);
    window._azCategory = category;

    renderAll();
  }

  // ── Render ─────────────────────────────────────────────────────────────────

  function renderAll() {
    const teams    = window._azTeams    || [];
    const ranks    = window._azRanks    || {};
    const category = window._azCategory || 'redraft';

    if (!teams.length) {
      document.getElementById('content').innerHTML = '<div class="empty-state"><p>No roster data found for this league</p></div>';
      return;
    }

    const getter = sortKey === 'overall'   ? t => t.overall
                 : sortKey === 'contender' ? t => t.contender
                 : t => (t.posValues[sortKey] ?? 0);
    const sorted = [...teams].sort((a, b) => getter(b) - getter(a));

    const badgeCls = category === 'dynasty' ? 'az-badge-dynasty'
                   : category === 'bestball' ? 'az-badge-bestball'
                   : 'az-badge-redraft';
    const badgeLbl = category === 'dynasty' ? 'Dynasty'
                   : category === 'bestball' ? 'Best Ball'
                   : 'Redraft';

    const sortPills = SORT_KEYS.map(s =>
      `<button class="az-pill${sortKey === s.key ? ' active' : ''}" onclick="setSort('${s.key}')">${s.label}</button>`
    ).join('');

    const cards = sorted.map((team, i) => {
      const rank    = i + 1;
      const rankCls = rank <= 3 ? ` az-rank-${rank}` : '';

      const displayName = team.teamName || team.ownerName || 'Team ' + team.rosterId;
      const ownerLine   = team.teamName && team.ownerName
        ? `<div class="az-owner-name">${esc(team.ownerName)}</div>` : '';

      const posBlocks = ['QB','RB','WR','TE','DL'].map(pos => {
        const v    = team.posValues[pos];
        const pRnk = (ranks[pos] || {})[team.rosterId];
        const lbl  = pos === 'DL' ? 'DL/LB/DB' : pos;
        return `<div class="az-pos-block">
          <div class="az-pos-block-label">${lbl}</div>
          <div class="az-pos-block-val">${fmtVal(v)}<span class="az-pos-rank">${ordinal(pRnk)}</span></div>
        </div>`;
      }).join('');

      const topPlayers = team.players.slice(0, 8).map(p =>
        `<div class="az-player-row">
          <span class="az-player-pos">${p.pos}</span>
          <span class="az-player-name">${esc(p.name)}</span>
          <span class="az-player-val">${fmtVal(p.val)}</span>
        </div>`
      ).join('');

      const orRnk   = (ranks.overall   || {})[team.rosterId];
      const conRnk  = (ranks.contender || {})[team.rosterId];

      return `<details class="az-card">
        <summary class="az-card-header">
          <div class="az-rank${rankCls}">#${rank}</div>
          <div class="az-team-info">
            <div class="az-team-name">${esc(displayName)}</div>
            ${ownerLine}
          </div>
          <div class="az-stats">
            <div class="az-stat">
              <div class="az-stat-label">Overall</div>
              <div class="az-stat-val${sortKey === 'overall' ? ' highlight' : ''}">${fmtVal(team.overall)} <span style="font-size:0.72rem;color:var(--brown-light);">${ordinal(orRnk)}</span></div>
            </div>
            <div class="az-stat">
              <div class="az-stat-label">Contender</div>
              <div class="az-stat-val${sortKey === 'contender' ? ' highlight' : ''}">${fmtVal(team.contender)} <span style="font-size:0.72rem;color:var(--brown-light);">${ordinal(conRnk)}</span></div>
            </div>
            <div class="az-stat">
              <div class="az-stat-label">Record</div>
              <div class="az-stat-val">${team.wins}-${team.losses}</div>
            </div>
          </div>
          <span class="az-chevron">›</span>
        </summary>
        <div class="az-card-body">
          <div class="az-pos-grid">${posBlocks}</div>
          <div class="az-players-label">Top Players</div>
          <div class="az-player-rows">${topPlayers || '<span style="color:var(--brown-light);font-style:italic;font-size:0.85rem;">No player data</span>'}</div>
        </div>
      </details>`;
    }).join('');

    document.getElementById('content').innerHTML = `
      <div style="margin-bottom:16px;display:flex;align-items:center;gap:10px;">
        <span class="az-badge ${badgeCls}">${badgeLbl}</span>
        <span style="font-family:'Crimson Text',serif;font-size:0.85rem;color:var(--brown-light);">${teams.length} teams</span>
      </div>
      <div class="az-sort-bar">
        <span class="az-sort-label">Sort by</span>
        ${sortPills}
      </div>
      <div class="az-cards">${cards}</div>
    `;
  }

  function setSort(key) {
    sortKey = key;
    renderAll();
  }

  init();
  </script>
</body>
</html>
