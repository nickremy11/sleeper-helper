<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dispersal Draft — FF Historian</title>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Playfair+Display:ital,wght@0,700;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
<style>
:root {
  --cream:       #f5ead6;
  --parchment:   #e8d5b0;
  --brown-dark:  #2a1a0e;
  --brown-mid:   #5c3d1e;
  --brown-light: #8b5e2e;
  --green:       #2d4a1e;
  --green-light: #4a7a2f;
  --red:         #8b1a1a;
  --gold:        #c9962a;
  --gold-light:  #e8b84b;
  --ink:         #1a1008;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background-color: var(--cream);
  color: var(--ink);
  font-family: 'Crimson Text', Georgia, serif;
  min-height: 100vh;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9962a' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0; opacity:0.3;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.15'/%3E%3C/svg%3E");
}
.page-wrap { position:relative; z-index:1; }

/* ── BANNER ── */
.banner { background:var(--green); border-bottom:6px double var(--gold); position:relative; overflow:hidden; }
.banner::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(-45deg,transparent,transparent 10px,rgba(0,0,0,0.06) 10px,rgba(0,0,0,0.06) 11px); }
.banner-inner { position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:24px 32px 20px; display:flex; align-items:center; gap:20px; }
.banner-text { flex:1; }
.banner-back { font-family:'Rye',serif; font-size:0.6rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--gold-light); text-decoration:none; opacity:0.7; display:inline-block; margin-bottom:8px; }
.banner-back:hover { opacity:1; }
.banner h1 { font-family:'Rye',serif; font-size:clamp(1.2rem,3vw,1.8rem); color:var(--cream); text-shadow:2px 2px 0 rgba(0,0,0,0.4); line-height:1.1; }
.banner h1 span { color:var(--gold-light); }
.banner-sub { margin-top:4px; font-family:'Playfair Display',serif; font-style:italic; font-size:0.88rem; color:var(--parchment); opacity:0.75; }

/* ── LAYOUT ── */
.main { max-width:1200px; margin:0 auto; padding:28px 24px 80px; }
.two-col { display:grid; grid-template-columns:360px 1fr; gap:20px; align-items:start; }
@media(max-width:900px) { .two-col { grid-template-columns:1fr; } }

/* ── SETUP WIZARD ── */
.wizard-wrap { max-width:700px; margin:0 auto; }
.step-indicator { display:flex; gap:8px; margin-bottom:28px; align-items:center; }
.step-dot { width:28px; height:28px; border-radius:50%; background:var(--brown-mid); border:2px solid var(--brown-light); display:flex; align-items:center; justify-content:center; font-family:'Rye',serif; font-size:0.5rem; color:var(--brown-light); flex-shrink:0; }
.step-dot.active { background:var(--green); border-color:var(--gold); color:var(--gold-light); }
.step-dot.done   { background:var(--gold); border-color:var(--gold); color:var(--brown-dark); }
.step-line { flex:1; height:2px; background:var(--brown-mid); }
.step-line.done { background:var(--gold); }
.setup-card { background:var(--brown-dark); border:2px solid var(--brown-mid); border-radius:2px; padding:22px 26px; margin-bottom:20px; box-shadow:4px 4px 0 var(--brown-mid); }
.setup-label { font-family:'Rye',serif; font-size:0.58rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--gold); display:block; margin-bottom:8px; }
.setup-label-sm { font-family:'Crimson Text',serif; font-size:0.82rem; color:var(--brown-light); font-style:italic; }
.setup-row { display:flex; gap:8px; }
.setup-input { flex:1; background:rgba(255,255,255,0.06); border:1px solid var(--brown-mid); color:var(--cream); font-family:'Crimson Text',serif; font-size:1rem; padding:8px 12px; border-radius:2px; outline:none; transition:border-color 0.2s; }
.setup-input:focus { border-color:var(--gold); }
.setup-input::placeholder { color:rgba(255,255,255,0.25); font-style:italic; }
.setup-btn { background:var(--green); border:2px solid var(--gold); color:var(--gold-light); font-family:'Rye',serif; font-size:0.58rem; letter-spacing:0.18em; text-transform:uppercase; padding:0 18px; cursor:pointer; border-radius:2px; transition:background 0.2s,color 0.2s; white-space:nowrap; min-height:40px; }
.setup-btn:hover { background:var(--gold); color:var(--brown-dark); }
.setup-btn:disabled { opacity:0.4; cursor:not-allowed; }
.setup-btn-sm { padding:6px 14px; min-height:auto; font-size:0.52rem; }
.setup-btn-ghost { background:transparent; border-color:var(--brown-mid); color:var(--brown-light); }
.setup-btn-ghost:hover { border-color:var(--gold); color:var(--gold); background:transparent; }
.setup-btn-danger { background:var(--red); border-color:#a02020; color:var(--cream); }
.setup-btn-danger:hover { background:#a02020; color:var(--cream); }
.setup-status { font-family:'Crimson Text',serif; font-size:0.85rem; font-style:italic; color:var(--brown-light); margin-top:6px; min-height:18px; }
.setup-status.ok  { color:var(--green-light); }
.setup-status.err { color:var(--red); }
.setup-divider { border:none; border-top:1px solid var(--brown-mid); margin:16px 0; }

/* ── LEAGUE SELECT ── */
.league-list { display:grid; gap:8px; }
.league-opt { background:rgba(255,255,255,0.04); border:1px solid var(--brown-mid); border-radius:2px; padding:12px 14px; cursor:pointer; transition:border-color 0.15s,background 0.15s; display:flex; align-items:center; gap:12px; }
.league-opt:hover { border-color:var(--gold); background:rgba(201,150,42,0.08); }
.league-opt.selected { border-color:var(--gold); background:rgba(201,150,42,0.12); }
.league-opt-name { font-family:'Playfair Display',serif; font-weight:700; font-size:0.95rem; color:var(--cream); flex:1; }
.league-opt-meta { font-family:'Crimson Text',serif; font-size:0.82rem; color:var(--brown-light); font-style:italic; }
.league-opt input[type=radio] { accent-color:var(--gold); flex-shrink:0; }

/* ── ROSTER SELECT ── */
.roster-list { display:grid; gap:8px; }
.roster-opt { background:rgba(255,255,255,0.04); border:1px solid var(--brown-mid); border-radius:2px; padding:10px 14px; cursor:pointer; display:flex; align-items:center; gap:12px; transition:border-color 0.15s; }
.roster-opt:hover { border-color:var(--gold-light); }
.roster-opt.selected { border-color:var(--gold); background:rgba(201,150,42,0.1); }
.roster-opt input[type=checkbox] { accent-color:var(--gold); flex-shrink:0; }
.roster-opt-name { font-family:'Playfair Display',serif; font-weight:700; color:var(--cream); font-size:0.9rem; }
.roster-opt-count { font-family:'Crimson Text',serif; font-size:0.82rem; color:var(--brown-light); font-style:italic; }

/* ── YEAR CHECKBOXES ── */
.year-row { display:flex; gap:12px; flex-wrap:wrap; }
.year-chip { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.04); border:1px solid var(--brown-mid); border-radius:2px; padding:8px 14px; cursor:pointer; transition:border-color 0.15s,background 0.15s; }
.year-chip:hover { border-color:var(--gold-light); }
.year-chip.selected { border-color:var(--gold); background:rgba(201,150,42,0.1); }
.year-chip input[type=checkbox] { accent-color:var(--gold); }
.year-chip span { font-family:'Rye',serif; font-size:0.6rem; letter-spacing:0.15em; color:var(--cream); }

/* ── DRAFT ORDER ── */
.order-list { display:grid; gap:8px; }
.order-item { background:rgba(255,255,255,0.05); border:1px solid var(--brown-mid); border-radius:2px; padding:10px 14px; display:flex; align-items:center; gap:12px; cursor:grab; user-select:none; }
.order-item.dragging { opacity:0.5; }
.order-item.drag-over { border-color:var(--gold); background:rgba(201,150,42,0.12); }
.order-num { font-family:'Rye',serif; font-size:0.7rem; color:var(--gold); width:24px; text-align:center; flex-shrink:0; }
.order-name { font-family:'Crimson Text',serif; font-size:0.95rem; color:var(--cream); flex:1; }
.drag-handle { color:var(--brown-light); font-size:1rem; cursor:grab; }

/* ── STATES ── */
.empty-state { text-align:center; padding:50px 20px; border:2px dashed var(--brown-mid); border-radius:2px; }
.empty-state p { font-family:'Playfair Display',serif; font-style:italic; font-size:1rem; color:var(--brown-light); }
.loading-state { text-align:center; padding:50px 20px; font-family:'Rye',serif; font-size:0.65rem; letter-spacing:0.3em; color:var(--brown-light); display:flex; flex-direction:column; align-items:center; gap:14px; }
.spinner { width:26px; height:26px; border:3px solid var(--brown-mid); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.err-msg { background:var(--red); border:1px solid #a02020; color:var(--cream); font-family:'Crimson Text',serif; font-style:italic; font-size:0.9rem; padding:10px 14px; border-radius:2px; margin-bottom:12px; }

/* ── SECTION HEAD ── */
.sect-head { display:flex; align-items:center; gap:14px; margin-bottom:18px; }
.sect-head h2 { font-family:'Rye',serif; font-size:1rem; color:var(--brown-dark); white-space:nowrap; }
.sect-line { flex:1; height:1px; background:linear-gradient(to right,var(--gold),transparent); }

/* ── DRAFT ROOM HEADER ── */
.room-header { background:var(--brown-dark); border:2px solid var(--gold); border-radius:2px; padding:16px 20px; margin-bottom:20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
.room-status { font-family:'Rye',serif; font-size:0.65rem; letter-spacing:0.2em; color:var(--gold-light); }
.room-clock { font-family:'Playfair Display',serif; font-weight:700; font-size:1.1rem; color:var(--cream); }
.room-clock.my-turn { color:var(--gold-light); animation:pulse-glow 1.5s ease-in-out infinite; }
@keyframes pulse-glow { 0%,100%{opacity:1;} 50%{opacity:0.65;} }
.room-progress { font-family:'Crimson Text',serif; font-size:0.88rem; color:var(--brown-light); font-style:italic; }
.room-actions { display:flex; gap:8px; align-items:center; }

/* ── LEFT PANEL (asset pool) ── */
.panel-left { position:sticky; top:0; }
.filter-bar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; align-items:center; }
.pos-pill { background:none; border:1px solid var(--brown-mid); color:var(--brown-light); font-family:'Rye',serif; font-size:0.48rem; letter-spacing:0.15em; padding:4px 10px; border-radius:2px; cursor:pointer; transition:all 0.15s; }
.pos-pill.active { background:var(--brown-dark); border-color:var(--gold); color:var(--gold-light); }
.show-drafted { display:flex; align-items:center; gap:6px; margin-left:auto; font-family:'Crimson Text',serif; font-size:0.82rem; color:var(--brown-light); cursor:pointer; }
.show-drafted input { accent-color:var(--gold); }
.asset-table-wrap { background:var(--brown-dark); border:1px solid var(--brown-mid); border-radius:2px; overflow:hidden; max-height:calc(100vh - 220px); overflow-y:auto; }
.asset-table { width:100%; border-collapse:collapse; }
.asset-table th { font-family:'Rye',serif; font-size:0.45rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); padding:8px 10px; text-align:left; border-bottom:2px solid var(--brown-mid); position:sticky; top:0; background:var(--brown-dark); z-index:10; }
.asset-table th.right { text-align:right; }
.asset-row { border-bottom:1px solid rgba(255,255,255,0.05); transition:background 0.1s; }
.asset-row:hover { background:rgba(255,255,255,0.04); }
.asset-row.drafted { opacity:0.35; }
.asset-row.drafted td { text-decoration:line-through; color:var(--brown-light); }
.asset-row.drafted .pick-btn { display:none; }
.asset-row td { padding:7px 10px; font-family:'Crimson Text',serif; font-size:0.88rem; color:var(--parchment); }
.asset-row td.val { text-align:right; font-family:'Playfair Display',serif; font-size:0.82rem; color:var(--gold); }
.asset-name { color:var(--cream); }
.pos-tag { display:inline-block; font-family:'Rye',serif; font-size:0.38rem; letter-spacing:0.1em; padding:2px 5px; border-radius:2px; margin-right:4px; }
.pos-QB { background:#3a2a00; color:#e8b84b; }
.pos-RB { background:#1a3a1a; color:#5cb85c; }
.pos-WR { background:#0d2a36; color:#5bc0de; }
.pos-TE { background:#3a1a0a; color:#e8734b; }
.pos-K  { background:#2a1a36; color:#9b59b6; }
.pos-PICK { background:#1a2a3a; color:#7ec8e3; }
.pos-DEF { background:#1e1e1e; color:#aaa; }
.pick-btn { background:var(--green); border:1px solid var(--gold); color:var(--gold-light); font-family:'Rye',serif; font-size:0.4rem; letter-spacing:0.12em; text-transform:uppercase; padding:4px 10px; cursor:pointer; border-radius:2px; transition:background 0.15s; white-space:nowrap; }
.pick-btn:hover { background:var(--gold); color:var(--brown-dark); }
.pick-btn:disabled { opacity:0.35; cursor:not-allowed; background:var(--green); color:var(--gold-light); }
.drafted-by { font-family:'Crimson Text',serif; font-size:0.75rem; color:var(--brown-light); font-style:italic; white-space:nowrap; }

/* ── RIGHT PANEL ── */
.panel-right { }
.panel-tabs { display:flex; gap:0; margin-bottom:16px; border-bottom:2px solid var(--brown-mid); }
.panel-tab { background:none; border:none; border-bottom:3px solid transparent; margin-bottom:-2px; font-family:'Rye',serif; font-size:0.55rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--brown-light); padding:10px 18px; cursor:pointer; transition:color 0.15s; }
.panel-tab.active { color:var(--gold-light); border-bottom-color:var(--gold-light); }

/* ── DRAFT GRID ── */
.draft-grid-scroll { overflow-x:auto; background:var(--brown-dark); border:1px solid var(--brown-mid); border-radius:2px; padding:12px; }
.draft-grid-table { display:grid; gap:3px; }
.grid-th { font-family:'Rye',serif; font-size:0.45rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); padding:6px 4px; text-align:center; border-bottom:1px solid var(--brown-mid); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.grid-th.my-col { color:var(--gold-light); background:rgba(201,150,42,0.08); border-radius:2px 2px 0 0; }
.grid-th.alt-col { background:rgba(255,255,255,0.04); }
.grid-round-lbl { font-family:'Rye',serif; font-size:0.42rem; letter-spacing:0.15em; color:var(--gold); padding:6px 4px; white-space:nowrap; display:flex; align-items:center; }
.grid-cell { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:2px; padding:5px 6px; min-height:44px; display:flex; align-items:center; font-family:'Crimson Text',serif; font-size:0.8rem; color:var(--parchment); line-height:1.2; overflow:hidden; text-overflow:ellipsis; word-break:break-word; }
.grid-cell.alt-col { background:rgba(255,255,255,0.05); }
.grid-cell.filled { background:rgba(44,80,30,0.25); border-color:rgba(74,122,47,0.3); }
.grid-cell.my-col { background:rgba(201,150,42,0.07); }
.grid-cell.on-clock { background:rgba(201,150,42,0.15); border-color:var(--gold); animation:pulse-border 1.5s ease-in-out infinite; font-family:'Rye',serif; font-size:0.42rem; letter-spacing:0.1em; color:var(--gold-light); justify-content:center; text-align:center; }
@keyframes pulse-border { 0%,100%{border-color:var(--gold);} 50%{border-color:rgba(201,150,42,0.3);} }
.grid-cell.future { opacity:0.3; }
.grid-cell.skipped { opacity:0.15; }
.grid-cell-pos { font-family:'Rye',serif; font-size:0.36rem; margin-right:4px; opacity:0.7; }

/* ── ROSTERS ── */
.rosters-wrap { display:grid; gap:12px; }
.roster-card { background:var(--brown-dark); border:1px solid var(--brown-mid); border-radius:2px; overflow:hidden; }
.roster-card-head { padding:10px 14px; background:rgba(0,0,0,0.2); border-bottom:1px solid var(--brown-mid); display:flex; align-items:center; gap:10px; }
.roster-card-name { font-family:'Playfair Display',serif; font-weight:700; font-size:0.95rem; color:var(--cream); flex:1; }
.roster-card-count { font-family:'Rye',serif; font-size:0.48rem; letter-spacing:0.12em; color:var(--gold); }
.roster-slots { display:grid; gap:1px; }
.roster-slot { display:flex; align-items:center; gap:10px; padding:6px 14px; border-bottom:1px dashed rgba(255,255,255,0.05); }
.roster-slot:last-child { border-bottom:none; }
.slot-pos { font-family:'Rye',serif; font-size:0.4rem; letter-spacing:0.1em; width:32px; flex-shrink:0; }
.slot-pos.QB { color:#e8b84b; } .slot-pos.RB { color:#5cb85c; }
.slot-pos.WR { color:#5bc0de; } .slot-pos.TE { color:#e8734b; }
.slot-pos.K  { color:#9b59b6; } .slot-pos.FLEX,.slot-pos.SF { color:var(--gold-light); }
.slot-pos.BN { color:var(--brown-light); }
.slot-player { font-family:'Crimson Text',serif; font-size:0.88rem; color:var(--parchment); flex:1; }
.slot-player.empty { color:var(--brown-light); font-style:italic; }
.slot-val { font-family:'Playfair Display',serif; font-size:0.78rem; color:var(--gold); text-align:right; }
.slot-starter { background:rgba(44,80,30,0.1); }
.slot-bench { background:rgba(0,0,0,0.1); }

/* ── CODES DISPLAY ── */
.codes-table { width:100%; border-collapse:collapse; }
.codes-table th { font-family:'Rye',serif; font-size:0.48rem; letter-spacing:0.12em; color:var(--gold); padding:8px 12px; text-align:left; border-bottom:1px solid var(--brown-mid); }
.codes-table td { padding:10px 12px; border-bottom:1px dashed rgba(255,255,255,0.07); }
.codes-table td:first-child { font-family:'Playfair Display',serif; font-weight:700; color:var(--cream); }
.codes-table td.code { font-family:'Rye',serif; font-size:0.9rem; letter-spacing:0.3em; color:var(--gold-light); }
.code-url { font-family:'Crimson Text',serif; font-size:0.88rem; color:var(--parchment); background:rgba(0,0,0,0.3); border:1px solid var(--brown-mid); padding:8px 12px; border-radius:2px; word-break:break-all; margin:12px 0; }
.copy-btn { background:none; border:1px solid var(--brown-mid); color:var(--brown-light); font-family:'Rye',serif; font-size:0.42rem; letter-spacing:0.1em; padding:3px 8px; cursor:pointer; border-radius:2px; }
.copy-btn:hover { border-color:var(--gold); color:var(--gold); }

/* ── BADGE ── */
.badge { display:inline-block; padding:2px 8px; border-radius:2px; font-family:'Rye',serif; font-size:0.5rem; letter-spacing:0.12em; text-transform:uppercase; }
.badge-gold  { background:var(--gold);  color:var(--brown-dark); }
.badge-green { background:var(--green); color:var(--gold-light); border:1px solid var(--gold); }
.badge-red   { background:var(--red);   color:var(--cream); }

/* ── CODES OVERLAY ── */
.codes-overlay { position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.75); display:flex; align-items:center; justify-content:center; }
.codes-overlay-inner { background:var(--brown-dark); border:2px solid var(--gold); border-radius:2px; padding:24px 28px; max-width:520px; width:90%; max-height:80vh; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,0.5); }

@media(max-width:600px) {
  .banner-inner { padding:16px; }
  .main { padding:16px 12px 60px; }
  .setup-card { padding:16px; }
  .room-header { flex-direction:column; align-items:flex-start; }
  .asset-table-wrap { max-height:none; }
  /* Larger tap targets for mobile drafters */
  .asset-row td { padding:11px 8px; }
  .pick-btn { padding:8px 14px; font-size:0.52rem; }
  .pos-pill { padding:7px 12px; }
  /* Hide value column to give name more room */
  .asset-table th.right:first-of-type,
  .asset-row td.val { display:none; }
}
</style>
</head>
<body>
<div class="page-wrap">

<header class="banner">
  <div class="banner-inner">
    <div class="banner-text">
      <a href="/index.html" class="banner-back">← Sleeper Helper</a>
      <h1>Dispersal <span>Draft</span></h1>
      <div class="banner-sub">Snake draft for dispersing dynasty rosters</div>
    </div>
  </div>
</header>

<main class="main" id="app">
  <div class="loading-state"><div class="spinner"></div>Loading…</div>
</main>

</div>
<script>
'use strict';

// ── Constants ────────────────────────────────────────────────────────────────

const IS_LOCAL    = location.protocol === 'file:' || location.hostname === 'localhost';
const SLEEPER_BASE = IS_LOCAL ? 'https://api.sleeper.app/v1' : '/api/sleeper';
const ROOM_ID     = new URLSearchParams(location.search).get('room') || null;

// ── State ─────────────────────────────────────────────────────────────────────

const D = {
  // Setup
  userId: null, leagues: [], selLeague: null, leagueDetails: null,
  rosters: [], users: [], tradedPicks: [], fcValues: null,
  selRosterIds: [], selYears: [], assetPool: [], draftOrder: [],
  extraPicks: [], pickFcMid: {},
  step: 1,
  // Draft room
  roomId: ROOM_ID,
  room: null, sessionToken: null, slotIndex: -1, commissionerCode: null,
  ws: null,
  // UI
  rightTab: 'draft', posFilter: 'ALL', showDrafted: false,
};

// ── Utilities ─────────────────────────────────────────────────────────────────

const $  = id => document.getElementById(id);
const app = () => document.getElementById('app');
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmtVal = v => v ? v.toLocaleString() : '—';
const loading = (msg = 'Loading…') => `<div class="loading-state"><div class="spinner"></div>${esc(msg)}</div>`;

function setApp(html) { app().innerHTML = html; }

async function sApi(path) {
  const r = await fetch(SLEEPER_BASE + path);
  if (!r.ok) throw new Error('Sleeper error ' + r.status);
  return r.json();
}

async function dApi(path, opts = {}) {
  const r = await fetch('/api/dispersal' + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
  });
  const text = await r.text();
  if (!r.ok) throw new Error(text || 'Error ' + r.status);
  try { return JSON.parse(text); } catch { return text; }
}

const FC_DIRECT = 'https://api.fantasycalc.com/values/current?isDynasty=true&numQbs=2&ppr=1&includePickValues=true';

async function fcApi() {
  if (D.fcValues) return D.fcValues;
  const r = await fetch(FC_DIRECT);
  if (!r.ok) throw new Error('FantasyCalc error');
  D.fcValues = await r.json();
  return D.fcValues;
}

// ── Position helpers ──────────────────────────────────────────────────────────

const POS_COLORS = { QB:'#e8b84b', RB:'#5cb85c', WR:'#5bc0de', TE:'#e8734b', K:'#9b59b6', PICK:'#7ec8e3', DEF:'#aaa' };

function posTag(pos) {
  const p = String(pos || '').toUpperCase();
  return `<span class="pos-tag pos-${p}" style="color:${POS_COLORS[p]||'#aaa'}">${esc(p)}</span>`;
}

function canFillSlot(slotPos, playerPos) {
  const s = slotPos?.toUpperCase(), p = playerPos?.toUpperCase();
  if (s === 'BN')   return true;
  if (s === 'FLEX') return ['RB','WR','TE'].includes(p);
  if (s === 'SF')   return !['K','DEF','PICK'].includes(p) && Boolean(p);
  return s === p;
}

function fillLineup(rosterPositions, pickedAssets) {
  const used = new Set();
  const filled = new Array(rosterPositions.length).fill(null);
  const sorted = [...pickedAssets].sort((a, b) => (b.fcValue || 0) - (a.fcValue || 0));
  const byPriority = ['QB','RB','WR','TE','K','DEF','FLEX','SF','BN'];
  const slotsByPri = byPriority.flatMap(p =>
    rosterPositions.map((sp, i) => [sp, i]).filter(([sp]) => sp === p)
  );
  for (const [slotPos, slotIdx] of slotsByPri) {
    const match = sorted.find(a => !used.has(a.id) && canFillSlot(slotPos, a.position));
    if (match) { filled[slotIdx] = match; used.add(match.id); }
  }
  return filled;
}

// ── Entry ─────────────────────────────────────────────────────────────────────

if (ROOM_ID) {
  initDraftRoom();
} else {
  initSetup();
}

// ═══════════════════════════════════════════════════════════════════════════════
// SETUP WIZARD
// ═══════════════════════════════════════════════════════════════════════════════

function initSetup() {
  D.step = 1;
  renderSetup();
}

function stepIndicator(cur) {
  const labels = ['League','Rosters','Picks','Order','Create'];
  const dots = labels.map((l, i) => {
    const n = i + 1;
    const cls = n < cur ? 'done' : n === cur ? 'active' : '';
    const line = i < labels.length - 1
      ? `<div class="step-line${n < cur ? ' done' : ''}"></div>` : '';
    return `<div class="step-dot ${cls}" title="${esc(l)}">${n < cur ? '✓' : n}</div>${line}`;
  }).join('');
  return `<div class="step-indicator">${dots}</div>`;
}

function renderSetup() {
  let inner = '';
  if (D.step === 1) inner = renderStep1();
  else if (D.step === 2) inner = renderStep2();
  else if (D.step === 3) inner = renderStep3();
  else if (D.step === 4) inner = renderStep4();
  setApp(`<div class="wizard-wrap">${stepIndicator(D.step)}${inner}</div>`);
  if (D.step === 4) initDragDrop();
}

// ── Step 1: Username + League ─────────────────────────────────────────────────

function renderStep1() {
  const sorted = [...D.leagues].sort((a, b) => a.name.localeCompare(b.name));
  const options = sorted.map(lg => {
    const sel = D.selLeague?.league_id === lg.league_id ? 'selected' : '';
    return `<option value="${esc(lg.league_id)}" ${sel}>${esc(lg.name)} — ${lg.total_rosters || '?'} teams · ${lg.season || ''}</option>`;
  }).join('');
  const leagueSelect = D.leagues.length
    ? `<select class="tracker-select" style="width:100%;margin-top:4px" onchange="selectLeague(this.value)">
        <option value="">— select a league —</option>
        ${options}
      </select>`
    : D.userId
      ? `<div class="empty-state" style="margin-top:12px"><p>No dynasty leagues found for this user.</p></div>`
      : '';
  return `
    <div class="setup-card">
      <label class="setup-label">Commissioner Sleeper Username</label>
      <div class="setup-row">
        <input type="text" id="s1-user" class="setup-input" placeholder="your sleeper username…" value="${esc(D.userId || '')}" onkeydown="if(event.key==='Enter')loadUser1()" />
        <button class="setup-btn" onclick="loadUser1()">Load</button>
      </div>
      <div class="setup-status" id="s1-status"></div>
      ${D.leagues.length ? '<hr class="setup-divider"/><label class="setup-label" style="margin-bottom:4px">Select League</label>' : ''}
      ${leagueSelect}
    </div>
    ${D.selLeague ? `<div style="display:flex;justify-content:flex-end;margin-top:12px"><button class="setup-btn" onclick="goStep(2)">Next: Select Rosters →</button></div>` : ''}`;
}

async function loadUser1() {
  const username = $('s1-user')?.value?.trim();
  if (!username) return;
  const st = $('s1-status');
  st.className = 'setup-status'; st.textContent = 'Loading…';
  try {
    const user = await sApi(`/user/${encodeURIComponent(username)}`);
    if (!user?.user_id) throw new Error('User not found');
    D.userId = user.user_id;
    const nflState = await sApi('/state/nfl');
    const season = nflState.season || new Date().getFullYear();
    const lgs = await sApi(`/user/${D.userId}/leagues/nfl/${season}`);
    D.leagues = (lgs || []).filter(lg => lg.settings?.type === 2); // dynasty only
    D.selLeague = null;
    st.className = 'setup-status ok'; st.textContent = `Loaded ${D.leagues.length} dynasty league(s).`;
    renderSetup();
  } catch (e) {
    st.className = 'setup-status err'; st.textContent = e.message || 'Error loading user.';
  }
}

function selectLeague(id) {
  D.selLeague = D.leagues.find(l => l.league_id === id);
  renderSetup();
}

// ── Step 2: Select Rosters ────────────────────────────────────────────────────

function renderStep2() {
  const items = D.rosters.map(r => {
    const user = D.users.find(u => u.user_id === r.owner_id);
    const name = r.metadata?.team_name || user?.display_name || user?.username || `Team ${r.roster_id}`;
    const count = (r.players || []).length;
    const sel = D.selRosterIds.includes(String(r.roster_id)) ? 'selected' : '';
    return `<label class="roster-opt ${sel}" onclick="toggleRoster('${esc(r.roster_id)}')">
      <input type="checkbox" ${sel ? 'checked' : ''}/>
      <div>
        <div class="roster-opt-name">${esc(name)}</div>
        <div class="roster-opt-count">${count} players</div>
      </div>
    </label>`;
  }).join('');
  const n = D.selRosterIds.length;
  return `
    <div class="setup-card">
      <label class="setup-label">${esc(D.selLeague?.name)} — Select Rosters to Disperse</label>
      <div class="setup-label-sm" style="margin-bottom:12px">Choose all teams whose players and picks will enter the draft pool.</div>
      ${D.rosters.length ? `<div class="roster-list">${items}</div>` : loading('Loading rosters…')}
    </div>
    <div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap">
      <button class="setup-btn setup-btn-ghost setup-btn-sm" onclick="goStep(1)">← Back</button>
      ${n >= 2 ? `<button class="setup-btn" onclick="goStep(3)">Next: Pick Years (${n} rosters) →</button>` : `<span class="setup-status" style="padding:0">Select at least 2 rosters</span>`}
    </div>`;
}

async function loadStep2() {
  const lgId = D.selLeague.league_id;
  const [rosters, users] = await Promise.all([
    sApi(`/league/${lgId}/rosters`),
    sApi(`/league/${lgId}/users`),
  ]);
  D.rosters = rosters || [];
  D.users   = users || [];
  D.selRosterIds = [];
  renderSetup();
}

function toggleRoster(id) {
  if (D.selRosterIds.includes(id)) {
    D.selRosterIds = D.selRosterIds.filter(r => r !== id);
  } else {
    D.selRosterIds.push(id);
  }
  renderSetup();
}

// ── Step 3: Pick Years ────────────────────────────────────────────────────────

function renderStep3() {
  const currentYear = parseInt(D.selLeague?.season || new Date().getFullYear(), 10);
  const years = [currentYear, currentYear + 1, currentYear + 2, currentYear + 3].map(String);
  const chips = years.map(y => {
    const sel = D.selYears.includes(y) ? 'selected' : '';
    return `<label class="year-chip ${sel}" onclick="toggleYear('${y}')">
      <input type="checkbox" ${sel ? 'checked' : ''} />
      <span>${y}</span>
    </label>`;
  }).join('');
  const n = D.selYears.length;
  return `
    <div class="setup-card">
      <label class="setup-label">Select Draft Pick Years</label>
      <div class="setup-label-sm" style="margin-bottom:14px">Future picks owned by the selected rosters will be included for each checked year.</div>
      <div class="year-row">${chips}</div>
    </div>
    <div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap">
      <button class="setup-btn setup-btn-ghost setup-btn-sm" onclick="goStep(2)">← Back</button>
      <button class="setup-btn" onclick="goStep(4)" ${n === 0 ? 'disabled' : ''}>Next: Draft Order →</button>
    </div>`;
}

function toggleYear(y) {
  if (D.selYears.includes(y)) D.selYears = D.selYears.filter(x => x !== y);
  else D.selYears.push(y);
  renderSetup();
}

// ── Step 4: Draft Order + Preview ─────────────────────────────────────────────

function renderStep4() {
  if (!D.draftOrder.length) {
    // initialize draftOrder from selected rosters
    D.draftOrder = D.selRosterIds.map((_, i) => i);
  }
  const slotNames = D.selRosterIds.map(id => {
    const r = D.rosters.find(r => String(r.roster_id) === String(id));
    const u = D.users.find(u => u.user_id === r?.owner_id);
    return r?.metadata?.team_name || u?.display_name || u?.username || `Roster ${id}`;
  });
  const items = D.draftOrder.map((slotIdx, pos) => {
    return `<div class="order-item" draggable="true" data-pos="${pos}" data-slot="${slotIdx}">
      <span class="drag-handle">⠿</span>
      <span class="order-num">${pos + 1}</span>
      <span class="order-name">${esc(slotNames[slotIdx])}</span>
    </div>`;
  }).join('');
  const totalAssets = D.assetPool.length + D.extraPicks.length;
  const n = D.selRosterIds.length;
  const rounds = totalAssets ? Math.ceil(totalAssets / n) : '?';
  const preview = D.assetPool.length
    ? `<div style="margin-top:12px;font-family:'Crimson Text',serif;font-size:0.88rem;color:var(--brown-light);font-style:italic;">${totalAssets} assets · ${rounds} rounds · ${n}-team snake</div>`
    : `<div style="margin-top:12px" class="loading-state" style="padding:12px"><div class="spinner"></div>Building asset pool…</div>`;

  const currentYear = parseInt(D.selLeague?.season || new Date().getFullYear(), 10);
  const yearOpts = [0,1,2,3].map(d => `<option value="${currentYear+d}">${currentYear+d}</option>`).join('');
  const roundOpts = [1,2,3,4,5].map(r => `<option value="${r}">Round ${r}</option>`).join('');
  const teamOpts = D.rosters.map(r => `<option value="${esc(r.roster_id)}">${esc(getTeamName(r))}</option>`).join('');
  const extraList = D.extraPicks.length
    ? `<div style="display:grid;gap:6px;margin-bottom:12px">${D.extraPicks.map((p, i) => `
        <div style="display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);border:1px solid var(--brown-mid);border-radius:2px;padding:7px 12px">
          <span class="pos-tag pos-PICK" style="color:#7ec8e3">PICK</span>
          <span style="flex:1;font-family:'Crimson Text',serif;font-size:0.9rem;color:var(--cream)">${esc(p.name)}</span>
          <button class="setup-btn setup-btn-sm setup-btn-ghost" onclick="removeExtraPick(${i})" style="padding:3px 10px;min-height:auto">Remove</button>
        </div>`).join('')}</div>`
    : '';

  return `
    <div class="setup-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:12px">
        <label class="setup-label" style="margin:0">Draft Order <span class="setup-label-sm">(drag to reorder)</span></label>
        <button class="setup-btn setup-btn-sm setup-btn-ghost" onclick="randomizeOrder()">Randomize</button>
      </div>
      <div class="order-list" id="order-list">${items}</div>
      ${preview}
    </div>
    <div class="setup-card" style="margin-top:0">
      <label class="setup-label" style="margin-bottom:4px">Extra Assets <span class="setup-label-sm">— optional</span></label>
      <div class="setup-label-sm" style="margin-bottom:12px">Add individual picks not already in the pool, e.g. compensation from a non-dispersed team.</div>
      ${extraList}
      <div class="setup-row" style="flex-wrap:wrap;gap:8px">
        <select id="ep-year" class="setup-input" style="flex:0 0 82px">${yearOpts}</select>
        <select id="ep-round" class="setup-input" style="flex:0 0 100px">${roundOpts}</select>
        <select id="ep-team" class="setup-input" style="flex:1;min-width:140px">
          <option value="">— team (optional) —</option>${teamOpts}
        </select>
        <button class="setup-btn setup-btn-sm" onclick="addExtraPick()" style="white-space:nowrap">+ Add Pick</button>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap">
      <button class="setup-btn setup-btn-ghost setup-btn-sm" onclick="goStep(3)">← Back</button>
      <button class="setup-btn" onclick="createRoom()" id="create-btn" ${!D.assetPool.length ? 'disabled' : ''}>Create Dispersal Room</button>
    </div>
    <div class="setup-status" id="create-status"></div>`;
}

function randomizeOrder() {
  for (let i = D.draftOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [D.draftOrder[i], D.draftOrder[j]] = [D.draftOrder[j], D.draftOrder[i]];
  }
  renderSetup();
}

function initDragDrop() {
  const list = $('order-list');
  if (!list) return;
  let dragFrom = null;
  list.querySelectorAll('.order-item').forEach(item => {
    item.addEventListener('dragstart', () => { dragFrom = +item.dataset.pos; item.classList.add('dragging'); });
    item.addEventListener('dragend', () => { item.classList.remove('dragging'); list.querySelectorAll('.order-item').forEach(i => i.classList.remove('drag-over')); });
    item.addEventListener('dragover', e => { e.preventDefault(); item.classList.add('drag-over'); });
    item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
    item.addEventListener('drop', e => {
      e.preventDefault();
      const to = +item.dataset.pos;
      if (dragFrom !== null && dragFrom !== to) {
        const moved = D.draftOrder.splice(dragFrom, 1)[0];
        D.draftOrder.splice(to, 0, moved);
        renderSetup();
      }
    });
  });
}

function addExtraPick() {
  const year  = parseInt($('ep-year')?.value || 0, 10);
  const round = parseInt($('ep-round')?.value || 0, 10);
  if (!year || !round) return;
  const rosterId = $('ep-team')?.value || '';
  const origRoster = D.rosters.find(r => String(r.roster_id) === rosterId);
  const origTeamName = origRoster ? getTeamName(origRoster) : '';
  const name = origTeamName ? `${year} Round ${round} (${origTeamName})` : `${year} Round ${round}`;
  const fcValue = D.pickFcMid[`${year}_${round}`] || 0;
  D.extraPicks.push({
    id: `extra_${year}_${round}_${rosterId || 'none'}_${Date.now()}`,
    name,
    position: 'PICK',
    nflTeam: null,
    fcValue,
    originalTeam: origTeamName || 'Extra',
    pickedBy: null,
  });
  renderSetup();
}

function removeExtraPick(idx) {
  D.extraPicks.splice(idx, 1);
  renderSetup();
}

async function loadStep4() {
  try {
    const playersUrl = IS_LOCAL ? 'https://api.sleeper.app/v1/players/nfl' : '/api/players';
    const prevLeagueId = D.selLeague.previous_league_id;
    const [fcData, tradedPicks, allPlayersRaw, draftsData, prevDraftsData] = await Promise.all([
      fcApi(),
      sApi(`/league/${D.selLeague.league_id}/traded_picks`),
      fetch(playersUrl).then(r => r.ok ? r.json() : {}),
      sApi(`/league/${D.selLeague.league_id}/drafts`),
      prevLeagueId ? sApi(`/league/${prevLeagueId}/drafts`) : Promise.resolve([]),
    ]);
    D.tradedPicks = tradedPicks || [];
    const playerMap = allPlayersRaw || {};

    // FC player lookup: sleeperId -> { value, name, position }
    const fcMap = {};
    for (const e of fcData) {
      if (e.player?.sleeperId) fcMap[e.player.sleeperId] = { value: e.value, name: e.player.name, position: e.player.position };
    }

    // FC pick lookup: "YEAR_ROUND_SLOT" -> value (specific) and "YEAR_ROUND" -> mid-round value (fallback)
    const totalLeagueTeams = D.selLeague.total_rosters || 12;
    const midPos = Math.max(0, Math.floor(totalLeagueTeams / 2) - 1);
    const pickFcFull = {};
    const pickFcMid  = {};
    for (const e of fcData) {
      if (e.player?.position === 'PICK') {
        const m = e.player.name.match(/^(\d{4}) Pick (\d+)\.(\d+)$/);
        if (m) {
          const [, yr, rd, pp] = m;
          const slot = parseInt(pp, 10);
          pickFcFull[`${yr}_${rd}_${slot}`] = e.value;
          if (slot - 1 === midPos) pickFcMid[`${yr}_${rd}`] = e.value;
        }
      }
    }
    D.pickFcMid = pickFcMid;

    // Build rosterToSlot maps from draft data for years with known pick order.
    // Check current league's drafts first, then fall back to the previous league's
    // drafts (Sleeper creates the current-year rookie draft in the prior season's league).
    // Use both slot_to_roster_id (slot→roster) and draft_order (userId→slot, resolved
    // via roster owner_id) — draft_order is the more reliably populated field.
    const rosterToSlotByYear = {};
    function applyDraftSlots(draft, overwrite = true) {
      const yr = String(draft.season);
      if (!D.selYears.includes(yr)) return;
      if (!overwrite && rosterToSlotByYear[yr]) return;
      const map = {};
      if (draft.slot_to_roster_id) {
        for (const [slot, rId] of Object.entries(draft.slot_to_roster_id)) {
          map[String(rId)] = parseInt(slot, 10);
        }
      }
      // draft_order maps userId → slot; resolve to rosterId via roster.owner_id
      if (draft.draft_order) {
        for (const [userId, slot] of Object.entries(draft.draft_order)) {
          const roster = D.rosters.find(r => r.owner_id === userId);
          if (roster && !map[String(roster.roster_id)]) {
            map[String(roster.roster_id)] = parseInt(slot, 10);
          }
        }
      }
      if (Object.keys(map).length > 0) rosterToSlotByYear[yr] = map;
    }
    for (const draft of (draftsData || [])) applyDraftSlots(draft, true);
    for (const draft of (prevDraftsData || [])) applyDraftSlots(draft, false);

    const allRosterIds = D.rosters.map(r => String(r.roster_id));
    const dispersedIds = D.selRosterIds.map(String);

    // Build pick ownership from roster.picks — each team's picks array contains
    // every pick they currently own, with pick.roster_id = original owner.
    // This is the authoritative source; traded_picks trade history is unreliable.
    const pickOwnerMap = {}; // "year_round_origRosterId" -> currentRosterId
    for (const roster of D.rosters) {
      for (const pick of (roster.picks || [])) {
        if (D.selYears.includes(String(pick.season))) {
          pickOwnerMap[`${pick.season}_${pick.round}_${pick.roster_id}`] = String(roster.roster_id);
        }
      }
    }

    const assets = [];

    // Players from dispersed rosters (no kickers)
    for (const rosterId of dispersedIds) {
      const roster = D.rosters.find(r => String(r.roster_id) === rosterId);
      const teamName = getTeamName(roster);
      for (const pid of (roster?.players || [])) {
        const fc = fcMap[String(pid)];
        const sp = playerMap[String(pid)];
        const position = (fc?.position || sp?.position || 'UNK').toUpperCase();
        if (position === 'K') continue;
        assets.push({
          id: String(pid),
          name: fc?.name || sp?.full_name || String(pid),
          position,
          nflTeam: sp?.team || null,
          fcValue: fc?.value || 0,
          originalTeam: teamName,
          pickedBy: null,
        });
      }
    }

    // Picks owned by dispersed rosters
    const rounds = D.selLeague.settings?.draft_rounds || 3;
    for (const year of D.selYears) {
      const rosterToSlot = rosterToSlotByYear[year] || {};
      for (let rd = 1; rd <= rounds; rd++) {
        for (const origId of allRosterIds) {
          const currentOwner = pickOwnerMap[`${year}_${rd}_${origId}`] ?? origId;
          if (!dispersedIds.includes(currentOwner)) continue;
          const roster = D.rosters.find(r => String(r.roster_id) === currentOwner);
          const teamName = getTeamName(roster);
          const slot = rosterToSlot[origId];
          const origRoster = D.rosters.find(r => String(r.roster_id) === origId);
          const origTeamName = getTeamName(origRoster);
          const name = slot
            ? `${year} ${rd}.${String(slot).padStart(2, '0')}`
            : `${year} Round ${rd} (${origTeamName})`;
          const fcValue = slot ? (pickFcFull[`${year}_${rd}_${slot}`] || 0) : (pickFcMid[`${year}_${rd}`] || 0);
          assets.push({
            id: `pick_${year}_${rd}_${origId}`,
            name,
            position: 'PICK',
            nflTeam: null,
            fcValue,
            originalTeam: teamName,
            pickedBy: null,
          });
        }
      }
    }

    assets.sort((a, b) => (b.fcValue || 0) - (a.fcValue || 0));
    D.assetPool = assets;
    D.draftOrder = D.selRosterIds.map((_, i) => i);
    renderSetup();
  } catch (e) {
    console.error(e);
  }
}

function getTeamName(roster) {
  if (!roster) return 'Unknown';
  const u = D.users.find(u => u.user_id === roster.owner_id);
  return roster.metadata?.team_name || u?.display_name || u?.username || `Roster ${roster.roster_id}`;
}

async function createRoom() {
  const btn = $('create-btn'), st = $('create-status');
  if (btn) btn.disabled = true;
  st.className = 'setup-status'; st.textContent = 'Creating room…';
  try {
    const teamSlots = D.selRosterIds.map((rosterId, i) => {
      const roster = D.rosters.find(r => String(r.roster_id) === String(rosterId));
      return { index: i, name: getTeamName(roster), rosterId: String(rosterId) };
    });
    const rosterPositions = D.selLeague.roster_positions || ['QB','RB','RB','WR','WR','TE','FLEX','SF','BN','BN','BN','BN','BN','BN'];
    const allAssets = [...D.assetPool, ...D.extraPicks]
      .sort((a, b) => (b.fcValue || 0) - (a.fcValue || 0));
    const body = {
      leagueId:        D.selLeague.league_id,
      leagueName:      D.selLeague.name,
      numTeams:        teamSlots.length,
      teamSlots,
      draftOrder:      D.draftOrder,
      assets:          allAssets,
      rosterPositions,
    };
    const res = await dApi('', { method: 'POST', body: JSON.stringify(body) });
    localStorage.setItem(`dispersal_${res.roomId}_commissioner`, res.commissionerCode);
    localStorage.setItem(`dispersal_${res.roomId}_slots`, JSON.stringify(res.teamSlots));
    renderCodesScreen(res);
  } catch (e) {
    st.className = 'setup-status err'; st.textContent = e.message || 'Failed to create room.';
    if (btn) btn.disabled = false;
  }
}

function renderCodesScreen(res) {
  const url = `${location.origin}/dispersal?room=${res.roomId}`;
  const rows = res.teamSlots.map(s =>
    `<tr><td>${esc(s.name)}</td><td class="code">${esc(s.claimCode)}</td></tr>`
  ).join('');
  setApp(`<div class="wizard-wrap">
    <div class="setup-card">
      <div class="sect-head" style="margin-bottom:16px"><h2>Room Created</h2><div class="sect-line"></div></div>
      <label class="setup-label">Share This URL</label>
      <div class="code-url">${esc(url)} <button class="copy-btn" onclick="copyText('${esc(url)}')">Copy</button></div>
      <label class="setup-label" style="margin-top:16px">Team Claim Codes</label>
      <div class="setup-label-sm" style="margin-bottom:10px">Share each team's code with their owner. Each code is used once to claim that team's draft slot.</div>
      <table class="codes-table"><thead><tr><th>Team</th><th>Claim Code</th></tr></thead><tbody>${rows}</tbody></table>
      <hr class="setup-divider"/>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <a href="/dispersal?room=${esc(res.roomId)}" class="setup-btn" style="text-decoration:none;display:inline-flex;align-items:center;">Enter Draft Room →</a>
      </div>
    </div>
  </div>`);
}

function copyText(text) {
  navigator.clipboard.writeText(text).catch(() => {});
}

// ── Step navigation ────────────────────────────────────────────────────────────

async function goStep(n) {
  D.step = n;
  if (n === 2 && !D.rosters.length) {
    renderSetup();
    await loadStep2();
  } else if (n === 4 && !D.assetPool.length) {
    renderSetup();
    await loadStep4();
  } else {
    renderSetup();
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// DRAFT ROOM
// ═══════════════════════════════════════════════════════════════════════════════

async function initDraftRoom() {
  D.commissionerCode = localStorage.getItem(`dispersal_${D.roomId}_commissioner`);
  D.sessionToken     = localStorage.getItem(`dispersal_${D.roomId}_token`);
  D.slotIndex        = parseInt(localStorage.getItem(`dispersal_${D.roomId}_slot`) ?? '-1', 10);

  setApp(loading('Loading room…'));
  try {
    D.room = await dApi('/' + D.roomId);
  } catch {
    setApp('<div class="err-msg">Room not found or has expired.</div>');
    return;
  }

  const isSpectator = localStorage.getItem(`dispersal_${D.roomId}_spectator`) === '1';

  if (D.sessionToken === null && D.slotIndex < 0 && !D.commissionerCode && !isSpectator) {
    renderClaimForm();
    return;
  }

  connectWs();
  renderDraftRoom();
}

function renderClaimForm() {
  setApp(`
    <div class="wizard-wrap" style="max-width:420px">
      <div class="setup-card">
        <div class="sect-head" style="margin-bottom:16px"><h2>Join Draft</h2><div class="sect-line"></div></div>
        <div class="setup-label-sm" style="margin-bottom:14px;font-size:0.9rem;color:var(--parchment)">
          ${esc(D.room?.leagueName || 'Dispersal Draft')} — enter the claim code your commissioner shared with you.
        </div>
        <label class="setup-label">Your Team Code</label>
        <div class="setup-row">
          <input type="text" id="claim-input" class="setup-input" placeholder="6-character code…" maxlength="8"
            style="text-transform:uppercase;letter-spacing:0.25em;font-family:'Rye',serif"
            onkeydown="if(event.key==='Enter')doClaim()" />
          <button class="setup-btn" onclick="doClaim()">Join</button>
        </div>
        <div class="setup-status" id="claim-status"></div>
      </div>
      <div style="text-align:center;margin-top:8px">
        <button class="setup-btn setup-btn-ghost setup-btn-sm" onclick="viewAsSpectator()">View as spectator</button>
      </div>
    </div>`);
  setTimeout(() => $('claim-input')?.focus(), 50);
}

async function doClaim() {
  const code = $('claim-input')?.value?.trim()?.toUpperCase();
  if (!code) return;
  const st = $('claim-status');
  st.className = 'setup-status'; st.textContent = 'Verifying…';
  try {
    const res = await dApi('/' + D.roomId + '/claim', {
      method: 'POST',
      body: JSON.stringify({ claimCode: code }),
    });
    D.sessionToken = res.sessionToken;
    D.slotIndex    = res.slotIndex;
    localStorage.setItem(`dispersal_${D.roomId}_token`, res.sessionToken);
    localStorage.setItem(`dispersal_${D.roomId}_slot`,  res.slotIndex);
    connectWs();
    renderDraftRoom();
  } catch {
    st.className = 'setup-status err'; st.textContent = 'Invalid code. Check with your commissioner.';
  }
}

function viewAsSpectator() {
  localStorage.setItem(`dispersal_${D.roomId}_spectator`, '1');
  connectWs();
  renderDraftRoom();
}

// ── WebSocket ─────────────────────────────────────────────────────────────────

function connectWs() {
  if (D.ws && D.ws.readyState <= 1) return; // already open or connecting
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  D.ws = new WebSocket(`${proto}//${location.host}/api/dispersal/${encodeURIComponent(D.roomId)}/ws`);
  D.ws.onmessage = evt => {
    try {
      const msg = JSON.parse(evt.data);
      if (msg.type === 'state') { D.room = msg.room; renderDraftRoom(); }
    } catch {}
  };
  D.ws.onclose = () => setTimeout(connectWs, 3000);
}

// ── Draft Room Render ─────────────────────────────────────────────────────────

function renderDraftRoom() {
  const room = D.room;
  if (!room) { setApp(loading()); return; }

  const n = room.numTeams;
  const totalAssets = room.assets.length;
  const totalRounds = Math.ceil(totalAssets / n);
  const mySlot      = D.slotIndex >= 0 ? room.teamSlots[D.slotIndex] : null;
  const onClockSlot = room.status === 'active' ? snakeSlot(room.currentOverallPick, n, room.draftOrder) : -1;
  const myTurn      = D.slotIndex >= 0 && D.slotIndex === onClockSlot;
  const onClockTeam = room.teamSlots[onClockSlot];

  // Header
  let statusLine = '', clockLine = '';
  if (room.status === 'complete') {
    statusLine = '<span class="badge badge-green">Draft Complete</span>';
    clockLine  = 'All picks have been made.';
  } else {
    const pick0 = room.currentOverallPick - 1;
    const curRound = Math.floor(pick0 / n) + 1;
    const curPos   = (pick0 % n) + 1;
    statusLine = `<span class="room-status">Round ${curRound}, Pick ${curPos} of ${totalAssets}</span>`;
    clockLine  = myTurn
      ? `You're On The Clock — pick now!`
      : `On The Clock: ${onClockTeam?.name || '…'}`;
  }

  const myName  = mySlot ? ` (${esc(mySlot.name)})` : D.commissionerCode ? ' (Commissioner)' : '';
  const myLabel = myName ? `<span style="font-family:'Crimson Text',serif;font-size:0.85rem;color:var(--brown-light);font-style:italic;">${myName}</span>` : '';

  const haspicks = room.picks.length > 0;
  const commBtn = D.commissionerCode
    ? `<button class="setup-btn setup-btn-sm setup-btn-ghost" onclick="showCodes()">View Codes</button>
       ${haspicks ? `<button class="setup-btn setup-btn-sm setup-btn-ghost" onclick="undoLastPick()" style="border-color:var(--gold-light);color:var(--gold-light)">Undo Pick</button>` : ''}
       <a href="/dispersal" class="setup-btn setup-btn-sm setup-btn-ghost" style="text-decoration:none;display:inline-flex;align-items:center;">← New Room</a>
       <button class="setup-btn setup-btn-sm setup-btn-danger" onclick="deleteRoom()">Delete Room</button>`
    : '';

  const header = `<div class="room-header">
    <div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">${statusLine}${myLabel}</div>
      <div class="room-clock ${myTurn ? 'my-turn' : ''}">${esc(clockLine)}</div>
      <div class="room-progress">${room.picks.length} / ${totalAssets} picks made · ${room.leagueName}</div>
    </div>
    <div class="room-actions">${commBtn}</div>
  </div>`;

  const leftPanel  = renderAssetPool(room, myTurn, onClockSlot);
  const rightPanel = renderRightPanel(room, mySlot);

  setApp(`${header}<div class="two-col">${leftPanel}${rightPanel}</div>`);
}

// ── Asset Pool (left) ─────────────────────────────────────────────────────────

function renderAssetPool(room, myTurn, onClockSlot) {
  const positions = ['ALL','QB','RB','WR','TE','PICK'];
  const pills = positions.map(p =>
    `<button class="pos-pill${D.posFilter === p ? ' active' : ''}" onclick="setFilter('${p}')">${p}</button>`
  ).join('');
  const showDraftedChk = `<label class="show-drafted">
    <input type="checkbox" ${D.showDrafted ? 'checked' : ''} onchange="toggleShowDrafted(this.checked)"/>
    Show Drafted
  </label>`;
  const filterBar = `<div class="filter-bar">${pills}${showDraftedChk}</div>`;

  let filtered = room.assets.filter(a => {
    if (D.posFilter !== 'ALL' && a.position !== D.posFilter) return false;
    if (!D.showDrafted && a.pickedBy !== null) return false;
    return true;
  });

  const rows = filtered.map(a => {
    const drafted  = a.pickedBy !== null;
    const drafter  = drafted ? room.teamSlots[a.pickedBy]?.name : null;
    const canPick  = myTurn && !drafted;
    return `<tr class="asset-row${drafted ? ' drafted' : ''}">
      <td><span class="asset-name">${esc(a.name)}</span></td>
      <td>${posTag(a.position)}</td>
      <td class="val">${fmtVal(a.fcValue)}</td>
      <td style="text-align:right">
        ${drafted
          ? `<span class="drafted-by">${esc(drafter || '?')}</span>`
          : `<button class="pick-btn" ${canPick ? '' : 'disabled'} onclick="makePick('${esc(a.id)}')">Pick</button>`
        }
      </td>
    </tr>`;
  }).join('');

  const table = filtered.length
    ? `<table class="asset-table"><thead><tr>
        <th>Player / Pick</th><th>Pos</th>
        <th class="right">Value</th><th class="right"></th>
      </tr></thead><tbody>${rows}</tbody></table>`
    : `<div class="empty-state" style="margin:0"><p>No assets match this filter.</p></div>`;

  return `<div class="panel-left">
    ${filterBar}
    <div class="asset-table-wrap">${table}</div>
  </div>`;
}

function setFilter(pos) { D.posFilter = pos; renderDraftRoom(); }
function toggleShowDrafted(v) { D.showDrafted = v; renderDraftRoom(); }

// ── Right Panel (draft grid / rosters) ───────────────────────────────────────

function renderRightPanel(room, mySlot) {
  const tabs = `<div class="panel-tabs">
    <button class="panel-tab${D.rightTab === 'draft' ? ' active' : ''}" onclick="setRightTab('draft')">Draft Board</button>
    <button class="panel-tab${D.rightTab === 'rosters' ? ' active' : ''}" onclick="setRightTab('rosters')">Rosters</button>
  </div>`;
  const content = D.rightTab === 'draft'
    ? renderDraftGrid(room, mySlot)
    : renderRosters(room, mySlot);
  return `<div class="panel-right">${tabs}${content}</div>`;
}

function setRightTab(tab) { D.rightTab = tab; renderDraftRoom(); }

function renderDraftGrid(room, mySlot) {
  const n = room.numTeams;
  const totalAssets = room.assets.length;
  const totalRounds = Math.ceil(totalAssets / n);

  // Column = team in draftOrder position c
  const colSlots = room.draftOrder.map(idx => room.teamSlots[idx]);

  // pickMap: overallPick -> pick record
  const pickMap = {};
  for (const p of room.picks) pickMap[p.overallPick] = p;
  // assetMap: assetId -> asset
  const assetMap = {};
  for (const a of room.assets) assetMap[a.id] = a;

  const templateCols = `48px repeat(${n}, minmax(80px, 1fr))`;

  // Header row
  const headerCells = colSlots.map((slot, c) => {
    const isMe = mySlot && slot?.index === mySlot.index;
    const claimed = slot?.claimed ? '' : '<span style="opacity:0.4"> ·?</span>';
    return `<div class="grid-th${isMe ? ' my-col' : ''}${c % 2 === 1 ? ' alt-col' : ''}">${esc(slot?.name || '?')}${claimed}</div>`;
  }).join('');

  let gridHtml = `<div class="draft-grid-table" style="grid-template-columns:${templateCols}">`;
  gridHtml += `<div></div>${headerCells}`;

  for (let r = 1; r <= totalRounds; r++) {
    gridHtml += `<div class="grid-round-lbl">Rd ${r}</div>`;
    for (let c = 0; c < n; c++) {
      // In round r (1-indexed): odd rounds go left-to-right, even rounds right-to-left
      const posInRound = r % 2 === 1 ? c : (n - 1 - c);
      const overallPick = (r - 1) * n + posInRound + 1;
      const slotIndex = room.draftOrder[c];
      const isMe = mySlot && slotIndex === mySlot.index;
      const isCurrent = room.status === 'active' && overallPick === room.currentOverallPick;
      const pick = pickMap[overallPick];

      let cellContent = '', cellClass = 'grid-cell';
      if (isMe) cellClass += ' my-col';
      if (c % 2 === 1) cellClass += ' alt-col';

      if (pick) {
        const asset = assetMap[pick.assetId];
        cellClass += ' filled';
        cellContent = `<span class="grid-cell-pos">${esc(asset?.position || '')}</span>${esc(asset?.name || '?')}`;
      } else if (isCurrent) {
        cellClass += ' on-clock';
        cellContent = '⏱ On Clock';
      } else if (overallPick > totalAssets) {
        cellClass += ' skipped';
        cellContent = '—';
      } else {
        cellClass += ' future';
      }

      gridHtml += `<div class="${cellClass}">${cellContent}</div>`;
    }
  }

  gridHtml += '</div>';
  return `<div class="draft-grid-scroll">${gridHtml}</div>`;
}

function renderRosters(room, mySlot) {
  const rp = (room.rosterPositions || []).filter(p => p.toUpperCase() !== 'K');
  const starterSet = new Set(['QB','RB','WR','TE','DEF','FLEX','SF']);
  const cards = room.teamSlots.map(slot => {
    const teamPicks = room.assets.filter(a => a.pickedBy === slot.index);
    const filled    = fillLineup(rp, teamPicks);
    const isMe      = mySlot && slot.index === mySlot.index;
    const slots     = rp.map((pos, i) => {
      const asset    = filled[i];
      const isStarter = starterSet.has(pos.toUpperCase());
      const slotClass = `roster-slot ${isStarter ? 'slot-starter' : 'slot-bench'}`;
      const posClass  = `slot-pos ${pos.toUpperCase()}`;
      const playerHtml = asset
        ? `<span class="slot-player">${esc(asset.name)}</span><span class="slot-val">${fmtVal(asset.fcValue)}</span>`
        : `<span class="slot-player empty">(empty)</span>`;
      return `<div class="${slotClass}"><span class="${posClass}">${esc(pos)}</span>${playerHtml}</div>`;
    }).join('');
    const badge = isMe ? ' <span class="badge badge-green">You</span>' : '';
    return `<div class="roster-card">
      <div class="roster-card-head">
        <div class="roster-card-name">${esc(slot.name)}${badge}</div>
        <div class="roster-card-count">${teamPicks.length} picks</div>
      </div>
      <div class="roster-slots">${slots}</div>
    </div>`;
  }).join('');
  const cols = Math.min(4, room.teamSlots.length);
  return `<div class="rosters-wrap" style="grid-template-columns:repeat(${cols},1fr)">${cards}</div>`;
}

// ── Pick Action ───────────────────────────────────────────────────────────────

function makePick(assetId) {
  if (!D.ws || D.ws.readyState !== WebSocket.OPEN) {
    alert('Not connected. Please wait a moment and try again.');
    return;
  }
  D.ws.send(JSON.stringify({ type: 'pick', assetId, sessionToken: D.sessionToken }));
}

// ── Commissioner Codes Overlay ────────────────────────────────────────────────

function showCodes() {
  let slots;
  try { slots = JSON.parse(localStorage.getItem(`dispersal_${D.roomId}_slots`) || 'null'); } catch {}
  if (!slots) {
    alert('Claim codes are no longer available in this browser. Share the room URL and have each team enter the codes from when you created the room.');
    return;
  }
  const rows = slots.map(s =>
    `<tr><td>${esc(s.name)}</td><td class="code">${esc(s.claimCode)}</td></tr>`
  ).join('');
  const roomUrl = `${location.origin}/dispersal?room=${D.roomId}`;
  const overlay = document.createElement('div');
  overlay.className = 'codes-overlay';
  overlay.innerHTML = `<div class="codes-overlay-inner">
    <div class="sect-head" style="margin-bottom:14px"><h2>Claim Codes</h2><div class="sect-line"></div></div>
    <label class="setup-label" style="margin-bottom:4px">Room URL</label>
    <div class="code-url" style="margin-bottom:16px">${esc(roomUrl)} <button class="copy-btn" onclick="navigator.clipboard.writeText('${esc(roomUrl)}').catch(()=>{})">Copy</button></div>
    <label class="setup-label" style="margin-bottom:8px">Team Codes</label>
    <table class="codes-table"><thead><tr><th>Team</th><th>Claim Code</th></tr></thead><tbody>${rows}</tbody></table>
    <hr class="setup-divider"/>
    <button class="setup-btn setup-btn-sm" onclick="this.closest('.codes-overlay').remove()">Close</button>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

// ── Undo Pick ─────────────────────────────────────────────────────────────────

async function undoLastPick() {
  const last = D.room?.picks?.at(-1);
  const asset = last ? D.room.assets.find(a => a.id === last.assetId) : null;
  const label = asset ? asset.name : 'the last pick';
  if (!confirm(`Undo ${label}?`)) return;
  try {
    await dApi('/' + D.roomId + '/undo', {
      method: 'POST',
      body: JSON.stringify({ commissionerCode: D.commissionerCode }),
    });
  } catch (e) {
    alert('Failed to undo pick: ' + e.message);
  }
}

// ── Delete Room ───────────────────────────────────────────────────────────────

async function deleteRoom() {
  if (!confirm('Delete this room? This cannot be undone.')) return;
  try {
    await fetch(`/api/dispersal/${D.roomId}`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ commissionerCode: D.commissionerCode }),
    });
    localStorage.removeItem(`dispersal_${D.roomId}_commissioner`);
    setApp('<div class="empty-state"><p>Room has been deleted.</p></div>');
  } catch (e) {
    alert('Failed to delete room: ' + e.message);
  }
}

// ── Snake slot helper (mirrors DO logic) ──────────────────────────────────────

function snakeSlot(overallPick, numTeams, draftOrder) {
  const pick0 = overallPick - 1;
  const round = Math.floor(pick0 / numTeams);
  const pos   = pick0 % numTeams;
  const idx   = round % 2 === 0 ? pos : (numTeams - 1 - pos);
  return draftOrder[idx];
}
