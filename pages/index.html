// ── League Summaries ──────────────────────────────────────────────────────────

async function renderLeagueSummaries() {
  if (!S.leagues.length) {
    setC('<div class="empty-state"><p>No leagues found for this user</p></div>');
    return;
  }
  if (LS.loaded) { lsDrawTable(); return; }
  if (LS.loading) return;
  LS.loading = true;
  // Ensure prefs are loaded (reuse RS.prefs; rsLoadPrefs populates it)
  if (!Object.keys(RS.prefs).length && RS.selectedLeagues === null) {
    RS.selectedLeagues = new Set(S.leagues.map(lg => lg.league_id));
    await rsLoadPrefs();
  }
  setC(loading('Loading league standings…'));
  try {
    await lsLoadData();
    LS.loaded = true;
  } catch(e) {
    setC(errHtml(e));
    LS.loading = false;
    return;
  }
  LS.loading = false;
  lsDrawTable();
}

async function lsLoadData() {
  await getNflState();
  await Promise.allSettled(S.leagues.map(async lg => {
    try {
      const rosters = await api('/league/' + lg.league_id + '/rosters');
      if (!rosters?.length) return;
      const mine = rosters.find(r => r.owner_id === S.userId);
      if (!mine) return;
      const numTeams = rosters.length;
      const detail = S.leagueDetails[lg.league_id];
      const playoffTeams = detail?.settings?.playoff_teams ?? Math.floor(numTeams / 2);
      // Sort by wins desc → points-for desc
      const sorted = [...rosters].sort((a, b) => {
        const wa = a.settings?.wins || 0, wb = b.settings?.wins || 0;
        if (wb !== wa) return wb - wa;
        const pfA = (a.settings?.fpts || 0) + (a.settings?.fpts_decimal || 0) / 100;
        const pfB = (b.settings?.fpts || 0) + (b.settings?.fpts_decimal || 0) / 100;
        return pfB - pfA;
      });
      const standing = sorted.findIndex(r => r.roster_id === mine.roster_id) + 1;
      LS.leagueData[lg.league_id] = {
        standing, numTeams, playoffTeams,
        wins:   mine.settings?.wins   || 0,
        losses: mine.settings?.losses || 0,
        myRosterId: mine.roster_id,
        apWins: null, apLosses: null,
      };
    } catch(_) {}
  }));
  // Now load all-play in parallel
  await Promise.allSettled(S.leagues.map(async lg => {
    const d = LS.leagueData[lg.league_id];
    if (!d) return;
    const ap = await lsLoadAllPlay(lg.league_id, d.myRosterId);
    d.apWins   = ap.apWins;
    d.apLosses = ap.apLosses;
  }));
}

async function lsLoadAllPlay(lgId, myRosterId) {
  const week = S.nflState?.week || 1;
  const weeksCompleted = Math.max(0, week - 1);
  if (weeksCompleted === 0) return { apWins: 0, apLosses: 0 };
  let apWins = 0, apLosses = 0;
  const results = await Promise.allSettled(
    Array.from({ length: weeksCompleted }, (_, i) => api('/league/' + lgId + '/matchups/' + (i + 1)))
  );
  for (const res of results) {
    if (res.status !== 'fulfilled' || !res.value) continue;
    const matchups = res.value;
    const mine = matchups.find(m => m.roster_id === myRosterId);
    if (!mine) continue;
    const myPts = mine.points || 0;
    if (myPts === 0) continue; // week not yet scored
    for (const other of matchups) {
      if (other.roster_id === myRosterId) continue;
      if (myPts > (other.points || 0)) apWins++; else apLosses++;
    }
  }
  return { apWins, apLosses };
}

function lsPlayoffChancesLabel(standing, numTeams) {
  if (standing <= 2) return { label: 'Virtual Lock',          cls: 'ls-chance-vl'    };
  if (standing <= 4) return { label: 'Looking Good',          cls: 'ls-chance-lg'    };
  if (numTeams >= 13) {
    if (standing <= 10) return { label: 'Nervy',              cls: 'ls-chance-nervy' };
    return               { label: 'Better Luck Next Year',    cls: 'ls-chance-blny'  };
  }
  if (standing <= 8)  return { label: 'Nervy',               cls: 'ls-chance-nervy' };
  return               { label: 'Better Luck Next Year',     cls: 'ls-chance-blny'  };
}

function lsSortRows(rows) {
  return [...rows].sort((a, b) => {
    let v = 0;
    if (LS.sortCol === 'name') {
      v = a.name.localeCompare(b.name);
    } else if (LS.sortCol === 'standing') {
      v = a.standing - b.standing;
    } else if (LS.sortCol === 'record') {
      v = b.wins !== a.wins ? b.wins - a.wins : a.losses - b.losses;
    } else if (LS.sortCol === 'allplay') {
      const apA = (a.apWins || 0), apB = (b.apWins || 0);
      v = apB - apA;
    } else if (LS.sortCol === 'chances') {
      v = a.standing - b.standing;
    }
    if (v !== 0) return v * LS.sortDir;
    // secondary: alphabetical
    return a.name.localeCompare(b.name);
  });
}

function lsSetFilter(f) {
  LS.filter = f;
  lsDrawTable();
}

function lsSort(col) {
  LS.sortDir = LS.sortCol === col ? LS.sortDir * -1 : (col === 'name' ? 1 : -1);
  LS.sortCol = col;
  lsDrawTable();
}

function lsDrawTable() {
  const hasPrefs = S.leagues.some(lg => RS.prefs[lg.league_id] !== null);

  // Build rows
  let rows = S.leagues.map(lg => {
    const d    = LS.leagueData[lg.league_id];
    const pref = RS.prefs[lg.league_id];
    return {
      lgId:       lg.league_id,
      name:       lg.name || 'Unnamed',
      contender:  pref?.contender === true,
      rebuilder:  pref !== null && pref?.contender === false,
      hasData:    !!d,
      standing:   d?.standing   ?? 999,
      numTeams:   d?.numTeams   ?? 0,
      playoffTeams: d?.playoffTeams ?? 0,
      wins:       d?.wins       ?? 0,
      losses:     d?.losses     ?? 0,
      apWins:     d?.apWins,
      apLosses:   d?.apLosses,
    };
  });

  // Apply filter
  if (LS.filter === 'contenders') rows = rows.filter(r => r.contender);
  if (LS.filter === 'rebuilders') rows = rows.filter(r => r.rebuilder);

  rows = lsSortRows(rows);

  const arr = (col) => {
    if (LS.sortCol !== col) return '<span class="ls-arr">⇅</span>';
    return `<span class="ls-arr">${LS.sortDir === -1 ? '↓' : '↑'}</span>`;
  };
  const thCls = (col) => LS.sortCol === col ? 'ls-sorted' : '';

  const cols = [
    { key: 'name',     lbl: 'League'         },
    { key: 'standing', lbl: 'Standing'       },
    { key: 'record',   lbl: 'Record'         },
    { key: 'allplay',  lbl: 'All-Play'       },
    { key: 'chances',  lbl: 'Playoff Chances'},
  ];

  const thead = `<thead><tr>${cols.map(c =>
    `<th class="${thCls(c.key)}" onclick="lsSort('${c.key}')">${c.lbl}${arr(c.key)}</th>`
  ).join('')}</tr></thead>`;

  const tbody = `<tbody>${rows.map(row => {
    // League name cell
    const nameCls = row.contender ? ' class="ls-contender-name"' : '';
    const nameCell = `<td><span${nameCls}>${esc(row.name)}</span></td>`;

    // Standing cell
    let standingCell;
    if (!row.hasData) {
      standingCell = '<td>—</td>';
    } else {
      const inPlayoffs = row.standing <= row.playoffTeams;
      if (inPlayoffs) {
        standingCell = `<td><span class="ls-po-v2">${row.standing}</span> <span style="font-size:0.72rem;color:var(--brown-light);">of ${row.numTeams}</span></td>`;
      } else {
        standingCell = `<td>${row.standing} <span style="font-size:0.72rem;color:var(--brown-light);">of ${row.numTeams}</span></td>`;
      }
    }

    // Record cell
    const recordCell = row.hasData
      ? `<td>${row.wins}-${row.losses}</td>`
      : '<td>—</td>';

    // All-play cell
    let apCell;
    if (!row.hasData || row.apWins === null) {
      apCell = '<td>—</td>';
    } else {
      apCell = `<td>${row.apWins}-${row.apLosses}</td>`;
    }

    // Playoff chances cell
    let chancesCell;
    if (!row.hasData) {
      chancesCell = '<td>—</td>';
    } else {
      const { label, cls } = lsPlayoffChancesLabel(row.standing, row.numTeams);
      chancesCell = `<td><span class="${cls}">${label}</span></td>`;
    }

    return `<tr>${nameCell}${standingCell}${recordCell}${apCell}${chancesCell}</tr>`;
  }).join('')}</tbody>`;

  const filterBtns = `
    <div class="ls-filter-bar">
      <span class="ls-filter-label">Filter</span>
      <button class="ghost-btn${LS.filter==='all'?' active':''}" onclick="lsSetFilter('all')" style="${LS.filter==='all'?'border-color:var(--gold);color:var(--gold);':''}">All</button>
      <button class="ghost-btn${LS.filter==='contenders'?' active':''}" onclick="lsSetFilter('contenders')"
        style="${LS.filter==='contenders'?'border-color:var(--gold);color:var(--gold);':''}"
        ${hasPrefs?'':'disabled title="Fill out Root For Me first"'}>Contenders</button>
      <button class="ghost-btn${LS.filter==='rebuilders'?' active':''}" onclick="lsSetFilter('rebuilders')"
        style="${LS.filter==='rebuilders'?'border-color:var(--gold);color:var(--gold);':''}"
        ${hasPrefs?'':'disabled title="Fill out Root For Me first"'}>Rebuilders</button>
    </div>`;

  setC(`
    <div class="section-head"><h2>League Summaries</h2><div class="section-head-line"></div></div>
    ${filterBtns}
    <div style="overflow-x:auto;">
      <table class="ls-table">${thead}${tbody}</table>
    </div>
    ${rows.length === 0 ? '<div class="empty-state" style="margin-top:12px;"><p>No leagues match the current filter</p></div>' : ''}
  `);
}

// ── 7. Trade Partners ─────────────────────────────────────────────────────────

function renderTradePartners() {
  const u1IsFixed = !!S.auth?.sleeper_username;
  const inputStyle = 'max-width:220px;';
  const user1Field = u1IsFixed
    ? `<span class="search-input" style="${inputStyle}display:inline-block;cursor:default;">${esc(S.auth.sleeper_username)}</span>`
    : `<input id="tp-u1" class="search-input" placeholder="User 1 username…" style="${inputStyle}" onkeydown="if(event.key==='Enter')doTradePartners()" />`;
  setC(`<div>
    <div class="section-head"><h2>Trade Partners</h2><div class="section-head-line"></div></div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px;">
      ${user1Field}
      <span style="color:var(--brown-light);font-family:'Rye',serif;font-size:0.6rem;">vs</span>
      <input id="tp-u2" class="search-input" placeholder="User 2 username…" style="${inputStyle}"
        onkeydown="if(event.key==='Enter')doTradePartners()" />
      <button class="setup-btn" onclick="doTradePartners()">Find</button>
    </div>
    <div id="tp-results"></div>
  </div>`);
}

async function doTradePartners() {
  const u1 = S.auth?.sleeper_username || document.getElementById('tp-u1')?.value.trim();
  const u2 = document.getElementById('tp-u2').value.trim();
  const r  = document.getElementById('tp-results');
  if (!u1 || !u2) { r.innerHTML = errHtml(new Error('Enter both usernames')); return; }
  r.innerHTML = loading('Looking up users…');
  try {
    const nflState = await getNflState();
    const season = nflState.league_create_season || nflState.season;
    const [usr1, usr2] = await Promise.all([api('/user/' + u1), api('/user/' + u2)]);
    if (!usr1?.user_id) throw new Error('User "' + u1 + '" not found');
    if (!usr2?.user_id) throw new Error('User "' + u2 + '" not found');
    TP.user1Id = usr1.user_id;
    TP.user2Id = usr2.user_id;

    const [lgs1, lgs2] = await Promise.all([
      api('/user/' + TP.user1Id + '/leagues/nfl/' + season),
      api('/user/' + TP.user2Id + '/leagues/nfl/' + season),
    ]);
    TP.user1Leagues = lgs1 || [];
    TP.user2Leagues = lgs2 || [];

    const set2 = new Set((lgs2 || []).map(l => l.league_id));
    const common = (lgs1 || []).filter(l => set2.has(l.league_id));

    const allMap = {};
    [...TP.user1Leagues, ...TP.user2Leagues].forEach(l => { allMap[l.league_id] = l; });
    TP.allLeagues = Object.values(allMap);
    TP.commonLeagues = common;

    const commonHtml = common.length
      ? `<div class="pf-theirs">${common.map(l => `<div class="data-row">
          <a href="https://sleeper.com/leagues/${esc(l.league_id)}" target="_blank" class="row-link">${esc(l.name)}</a>
          <span class="card-meta">${l.total_rosters} teams</span>
        </div>`).join('')}</div>`
      : '<div class="empty-state" style="padding:12px;"><p>No leagues in common</p></div>';

    TP.u1Label = usr1.display_name || u1;
    TP.u2Label = usr2.display_name || u2;
    r.innerHTML = `
      <div class="section-head" style="margin-bottom:12px;">
        <h2>Common Leagues (${common.length})</h2><div class="section-head-line"></div>
      </div>
      <div style="margin-bottom:24px;">${commonHtml}</div>
      <div class="section-head" style="margin-bottom:12px;">
        <h2>Player Search</h2><div class="section-head-line"></div>
      </div>
      <div style="margin-bottom:12px;">
        <div class="player-ac-wrap" id="tp-ac">
          <input id="tp-ps" class="search-input" placeholder="Search player name…"
            oninput="tpShowDropdown()" autocomplete="off" />
          <div class="player-dropdown" id="tp-dropdown" style="display:none;"></div>
        </div>
      </div>
      <div id="tp-ps-r"><div class="empty-state"><p>Search and select a player to see who has them</p></div></div>
    `;
    document.addEventListener('click', _tpOutsideClick);
  } catch(e) { r.innerHTML = errHtml(e); }
}

function _tpOutsideClick(e) {
  const ac = document.getElementById('tp-ac');
  if (!ac) { document.removeEventListener('click', _tpOutsideClick); return; }
  if (!ac.contains(e.target)) document.getElementById('tp-dropdown').style.display = 'none';
}

async function tpShowDropdown() {
  const q = document.getElementById('tp-ps').value.trim().toLowerCase();
  const dd = document.getElementById('tp-dropdown');
  if (q.length < 2) { dd.style.display = 'none'; return; }
  await loadPlayers();
  const matches = Object.entries(S.players)
    .filter(([,p]) => p.full_name?.toLowerCase().includes(q))
    .sort((a,b) => {
      const aS = a[1].full_name.toLowerCase().startsWith(q) ? 0 : 1;
      const bS = b[1].full_name.toLowerCase().startsWith(q) ? 0 : 1;
      return aS - bS || a[1].full_name.localeCompare(b[1].full_name);
    }).slice(0, 12);
  if (!matches.length) { dd.style.display = 'none'; return; }
  dd.innerHTML = matches.map(([pid, p]) =>
    `<div class="player-dropdown-item" onmousedown="tpSelectPlayer('${esc(pid)}')">`+
    `${esc(p.full_name)} <span class="player-dropdown-meta">${esc(p.position||'')} · ${esc(p.team||'FA')}</span></div>`
  ).join('');
  dd.style.display = 'block';
}

async function tpSelectPlayer(pid) {
  document.getElementById('tp-dropdown').style.display = 'none';
  const player = S.players[pid];
  if (!player) return;
  document.getElementById('tp-ps').value = player.full_name;
  const r = document.getElementById('tp-ps-r');
  r.innerHTML = loading('Checking rosters…');

  const none = `<span style="font-style:italic;color:var(--brown-light);font-size:0.9rem;">Not owned</span>`;

  try {
    const rData = await Promise.all(TP.commonLeagues.map(lg =>
      api('/league/' + lg.league_id + '/rosters').then(rs => ({ lg, rs: rs || [] })).catch(() => null)
    ));

    const u1Has = [], u2Has = [];
    for (const rd of rData) {
      if (!rd) continue;
      const r1 = rd.rs.find(ro => ro.owner_id === TP.user1Id);
      const r2 = rd.rs.find(ro => ro.owner_id === TP.user2Id);
      if (r1?.players?.includes(pid)) u1Has.push({ name: rd.lg.name, id: rd.lg.league_id });
      if (r2?.players?.includes(pid)) u2Has.push({ name: rd.lg.name, id: rd.lg.league_id });
    }
    if (!u1Has.length && !u2Has.length) {
      r.innerHTML = '<div class="empty-state"><p>Neither user has that player in shared leagues</p></div>'; return;
    }

    const colStyle = 'min-width:0;';
    const mkRows = arr => arr.map(l => `<div class="data-row"><a href="https://sleeper.com/leagues/${esc(l.id)}" target="_blank" class="row-link">${esc(l.name)}</a></div>`).join('');
    r.innerHTML = `<div style="margin-bottom:14px;background:var(--brown-dark);border:1px solid var(--brown-mid);border-radius:2px;padding:12px 16px;">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;">
        <span class="card-title">${esc(player.full_name)}</span>
        <span class="card-meta">${esc(player.position||'')} · ${esc(player.team||'FA')}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div style="${colStyle}"><div class="sect">${esc(TP.u1Label)}</div>${u1Has.length ? mkRows(u1Has) : none}</div>
        <div style="${colStyle}"><div class="sect">${esc(TP.u2Label)}</div>${u2Has.length ? mkRows(u2Has) : none}</div>
      </div>
    </div>`;
  } catch(e) { r.innerHTML = errHtml(e); }
}

// ── Auth ──────────────────────────────────────────────────────────────────────

function updateTokenRow(user) {
  const savedRow    = document.getElementById('token-saved-row');
  const inputRow    = document.getElementById('token-input-row');
  const saveAcctBtn = document.getElementById('token-save-acct-btn');
  if (user?.has_token) {
    savedRow.style.display = '';
    inputRow.style.display = 'none';
  } else {
    savedRow.style.display = 'none';
    inputRow.style.display = '';
    if (saveAcctBtn) saveAcctBtn.style.display = user ? '' : 'none';
  }
  const espnRow = document.getElementById('espn-settings-row');
  if (espnRow) espnRow.style.display = user ? '' : 'none';
  if (user) loadEspnSettings();
}

async function loadEspnSettings() {
  if (!S.auth) return;
  try {
    const r = await fetch('/api/espn/settings', { credentials: 'include' });
    if (!r.ok) return;
    const d = await r.json();
    const el = document.getElementById('espn-league-ids');
    if (el) el.value = (d.league_ids || []).join(', ');
    const status = document.getElementById('espn-settings-status');
    if (status && d.has_credentials) status.textContent = 'ESPN credentials saved';
  } catch {}
}

async function saveEspnSettings() {
  const ids = (document.getElementById('espn-league-ids')?.value || '')
    .split(',').map(s => s.trim()).filter(Boolean).map(Number).filter(n => n > 0);
  const s2   = document.getElementById('espn-s2')?.value.trim()   || '';
  const swid = document.getElementById('espn-swid')?.value.trim() || '';
  const status = document.getElementById('espn-settings-status');
  if (status) status.textContent = 'Saving…';
  try {
    const r = await fetch('/api/espn/settings', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ league_ids: ids, espn_s2: s2, swid }),
    });
    if (status) status.textContent = r.ok ? 'Saved!' : 'Error saving';
  } catch { if (status) status.textContent = 'Error saving'; }
}

function showReplaceToken() {
  document.getElementById('token-saved-row').style.display = 'none';
  document.getElementById('token-input-row').style.display = '';
  const btn = document.getElementById('token-save-acct-btn');
  if (btn && S.auth) btn.style.display = '';
}

async function saveTokenToAccount() {
  const t  = document.getElementById('token-input').value.trim();
  const st = document.getElementById('token-status');
  if (!t) { st.textContent = 'Paste your token first'; st.className = 'setup-status err'; return; }
  S.token = t;
  document.getElementById('token-input').value = '';
  st.textContent = 'Saving…'; st.className = 'setup-status';
  try {
    const r    = await fetch('/api/auth/me', { method: 'PATCH', credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: t }) });
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    if (S.auth) S.auth.has_token = true;
    updateTokenRow(S.auth);
    if (S.tab === 'trades' && S.userId) renderTrades();
  } catch(e) { st.textContent = 'Error: ' + e.message; st.className = 'setup-status err'; }
}

(async function () {
  function _applyAuth(user) {
    S.auth = user;
    updateTokenRow(user);
    if (user.sleeper_username && !S.userId) {
      document.getElementById('u-input').value = user.sleeper_username;
      loadUser();
    }
  }

  const initUser = await SharedAuth.init({
    chipContainerId: 'auth-chip',
    onLogin:  (user) => { _applyAuth(user); },
    onLogout: ()     => { S.auth = null; updateTokenRow(null); },
  });

  // onLogin only fires when signing in via the modal — handle the
  // already-signed-in case (existing session cookie) here.
  if (initUser) _applyAuth(initUser);
})();
</script>
